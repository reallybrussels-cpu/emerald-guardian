<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emerald Vault</title>

<style>
body{
margin:0;
background:#000;
font-family:serif;
overflow:hidden;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
transition:1.5s;
}

#intro h1{
color:#d4af37;
letter-spacing:3px;
}

/* WATERMARK */
#watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:rgba(255,255,255,0.03);
pointer-events:none;
z-index:9;
}

/* BOOK */
#book{
display:flex;
width:100%;
height:100vh;
}

.page{
width:50%;
padding:50px;
background:#111;
color:#fff;
transition:0.8s;
overflow:hidden;
}

.page img{
width:100%;
transition:0.5s;
cursor:zoom-in;
}

.page img:hover{
transform:scale(1.5);
}

/* NAV */
.nav{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:none;
color:#d4af37;
cursor:pointer;
}

button:hover{
background:#d4af37;
color:#000;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>Emerald Guardian</h1>
<p style="color:#777">Confidential Access</p>
<button onclick="enter()">ENTER</button>
</div>

<div id="watermark"></div>

<div id="book">

<div class="page" id="left"></div>
<div class="page" id="right"></div>

</div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<!-- AUDIO -->
<audio id="audio" src="assets/audio.mp3" loop></audio>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data } = await supabase.auth.getUser();

if(!data.user){
  location.href = "/";
}

document.getElementById("watermark").innerText = data.user.email;

/* INTRO */
window.enter = function(){
  document.getElementById("intro").style.opacity = 0;

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("audio").play();
  },800);
}

/* PROTEÇÃO */
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e=>{
  if(e.key === "PrintScreen"){
    alert("Protected content");
  }
});

/* TRACKING */
let startTime = Date.now();

function track(page){
  const timeSpent = Math.floor((Date.now()-startTime)/1000);

  console.log({
    user: data.user.email,
    page,
    timeSpent
  });
}

/* PAGES */
const pages = [

{
title:"Emerald Guardian",
content:"Confidential acquisition dossier"
},

{
title:"Certification",
content:"Official gemstone certification",
image:"assets/cert.jpg"
},

{
title:"Video",
video:"assets/video.mp4"
},

{
title:"Acquisition",
content:"Available only via private negotiation"
}

];

let index = 0;

function render(){

  const left = document.getElementById("left");
  const right = document.getElementById("right");

  const p1 = pages[index];
  const p2 = pages[index+1];

  left.innerHTML = build(p1);

  if(p2){
    right.innerHTML = build(p2);
  }

  track(index);
}

function build(p){

  if(!p) return "";

  if(p.video){
    return `
    <video width="100%" controls>
      <source src="${p.video}">
    </video>
    `;
  }

  return `
  <h1 style="color:#d4af37">${p.title}</h1>
  <p>${p.content || ""}</p>
  ${p.image ? `<img src="${p.image}">` : ""}
  `;
}

window.next = function(){
  if(index < pages.length-1){
    index++;
    render();
  }
}

window.prev = function(){
  if(index > 0){
    index--;
    render();
  }
}

render();

</script>

</body>
</html>
