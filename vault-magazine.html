<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emerald Vault</title>

<style>
body{
margin:0;
background:#000;
font-family:serif;
overflow:hidden;
}

/* WATERMARK */
#watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
color:rgba(255,255,255,0.03);
pointer-events:none;
z-index:999;
}

/* BOOK */
#book{
width:90vw;
height:90vh;
position:absolute;
top:0;bottom:0;left:0;right:0;
margin:auto;
display:flex;
}

/* PAGE */
.page{
width:50%;
height:100%;
background:#111;
color:#fff;
padding:40px;
box-sizing:border-box;
transition:0.8s;
overflow:hidden;
position:relative;
}

.page img{
width:100%;
transition:0.5s;
cursor:zoom-in;
}

.page img:hover{
transform:scale(1.4);
}

/* TEXT */
h1{color:#d4af37;}
p{color:#ccc;}

/* NAV */
.nav{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:none;
color:#d4af37;
cursor:pointer;
}

button:hover{
background:#d4af37;
color:#000;
}

/* FADE */
.fade{
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}
</style>
</head>

<body>

<div id="watermark"></div>

<div id="book">

<div class="page" id="left">
<h1>Emerald Guardian</h1>
<p>Confidential acquisition dossier.</p>
</div>

<div class="page" id="right">
<h1>Origin</h1>
<img src="assets/images/emerald.jpg">
</div>

</div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* 🔐 LOGIN CHECK */
const { data } = await supabase.auth.getUser();

if(!data.user){
  location.href = "/";
}

document.getElementById("watermark").innerText = data.user.email;

/* 🚫 PROTECTION */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", e=>{
  if(e.key === "PrintScreen"){
    alert("Protected content");
  }
});

/* 📊 TRACKING */
function track(page){
  console.log("User:", data.user.email, "Page:", page);
}

/* 📖 PAGES */
const pages = [
{
title:"Emerald Guardian",
content:"Confidential acquisition dossier"
},
{
title:"Certification",
content:"Includes lab reports"
},
{
title:"Video",
video:"assets/videos/video.mp4"
}
];

let index = 0;

function render(){

  const left = document.getElementById("left");
  const right = document.getElementById("right");

  left.classList.add("fade");
  right.classList.add("fade");

  left.innerHTML = `
    <h1>${pages[index].title}</h1>
    <p>${pages[index].content || ""}</p>
  `;

  const nextPage = pages[index+1];

  if(nextPage){
    if(nextPage.video){
      right.innerHTML = `
        <video width="100%" controls>
        <source src="${nextPage.video}">
        </video>
      `;
    }else{
      right.innerHTML = `
        <h1>${nextPage.title}</h1>
        <p>${nextPage.content || ""}</p>
      `;
    }
  }

  track(index);
}

window.next = function(){
  if(index < pages.length-1){
    index++;
    render();
  }
}

window.prev = function(){
  if(index > 0){
    index--;
    render();
  }
}

render();

</script>

</body>
</html>
