<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:serif;}
#watermark{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
opacity:0.05;
font-size:40px;
}
.page{width:50%;float:left;padding:40px;}
.nav{position:fixed;bottom:20px;width:100%;text-align:center;}
button{padding:10px;border:1px solid gold;background:none;color:gold;}
</style>
</head>

<body>

<div id="watermark"></div>

<div id="left" class="page"></div>
<div id="right" class="page"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data } = await supabase.auth.getUser();

if(!data.user) location.href="/";

/* BUSCAR USUÁRIO */
const { data: user } = await supabase
.from("users_access")
.select("*")
.eq("email", data.user.email)
.single();

/* 🔐 VALIDAÇÕES */
if(!user || user.status !== "aprovado"){
  alert("Access denied");
  location.href="/";
}

/* ⏳ EXPIRAÇÃO */
if(user.expires_at && new Date(user.expires_at) < new Date()){
  alert("Access expired");
  location.href="/";
}

/* WATERMARK */
document.getElementById("watermark").innerText = data.user.email;

/* LOG */
await supabase.from("vault_logs").insert({
  email: data.user.email,
  action: "enter_vault"
});

/* TRACK */
let start = Date.now();

async function track(page){
  await supabase.from("vault_tracking").insert({
    email:data.user.email,
    page_index:page,
    time_spent: Math.floor((Date.now()-start)/1000)
  });
}

/* DADOS */
let pages=[];
let index=0;

async function load(){
  const { data } = await supabase
    .from("vault_pages")
    .select("*")
    .order("order_index");

  pages=data||[];
  render();
}

/* BUILD */
function build(p){

if(!p) return "";

/* 🔥 FLIPBOOK DETECT */
if(p.title && p.title.toLowerCase().includes("flip")){

return `
<div style="width:100%; height:100vh; background:black;">
  <iframe 
    src="https://heyzine.com/flip-book/615bab6331.html"
    width="100%" 
    height="100%" 
    style="border:none;"
    allowfullscreen>
  </iframe>
</div>

Mas primeiro vamos validar isso funcionando.
`;

}

/* NORMAL */

if(p.video_url){
return `<video width="100%" controls controlsList="nodownload">
<source src="${p.video_url}">
</video>`;
}

if(p.image_url){
return `<canvas id="c-${p.id}" style="width:100%"></canvas>`;
}

return `<h2>${p.title}</h2><p>${p.content||""}</p>`;
}

/* WATERMARK REAL */
function apply(){

pages.forEach(p=>{
if(!p.image_url) return;

const c=document.getElementById(`c-${p.id}`);
if(!c) return;

const ctx=c.getContext("2d");
const img=new Image();
img.crossOrigin="anonymous";
img.src=p.image_url;

img.onload=()=>{
c.width=img.width;
c.height=img.height;
ctx.drawImage(img,0,0);
ctx.fillStyle="rgba(255,255,255,0.1)";
ctx.font="40px Arial";
ctx.fillText(data.user.email,50,img.height/2);
}
});
}

/* RENDER */
function render(){

const l=document.getElementById("left");
const r=document.getElementById("right");

l.innerHTML=build(pages[index]);
r.innerHTML=build(pages[index+1]);

track(index);
setTimeout(apply,200);
}

/* NAV */
window.next=()=>{ if(index<pages.length-1){index++;render();}}
window.prev=()=>{ if(index>0){index--;render();}}

load();

/* BLOQUEIOS */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
if(e.ctrlKey && ["s","u"].includes(e.key)) e.preventDefault();
});

</script>

</body>
</html>
