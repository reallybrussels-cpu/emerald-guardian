<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emerald Vault</title>

<style>
body{
margin:0;
background:#000;
font-family:serif;
overflow:hidden;
}

/* LIVRO */
.book{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
perspective:2000px;
position:relative;
}

/* PÁGINA */
.page{
width:50%;
height:80%;
position:absolute;
top:10%;
background:#111;
color:#fff;
padding:40px;
box-sizing:border-box;
overflow:auto;
transition:transform 0.8s;
backface-visibility:hidden;
}

/* LADOS */
.left{ left:0; transform-origin:right; }
.right{ left:50%; transform-origin:left; }

/* VIRADA */
.flipped.left{ transform:rotateY(180deg); }
.flipped.right{ transform:rotateY(-180deg); }

/* IMG */
img{
width:100%;
margin-top:10px;
border-radius:6px;
}

/* NAV */
.nav{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
z-index:10;
}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:none;
color:#d4af37;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.page{
width:100%;
left:0 !important;
}
.right{ display:none; }
}
</style>
</head>

<body>

<div class="book" id="book"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data } = await supabase.auth.getUser();
if(!data.user){
alert("Faça login");
location.href="/";
}

/* DADOS */
const { data: pages } = await supabase
.from("vault_pages")
.select("*")
.order("order_index");

if(!pages || pages.length===0){
document.body.innerHTML="<h2 style='color:white;padding:20px'>Sem conteúdo</h2>";
throw "sem dados";
}

/* ESTADO */
let current=0;

/* BUILD */
function build(p){

if(!p) return "";

return `
<h2>${p.title || ""}</h2>
<p>${p.content || ""}</p>
${p.image_url ? `<img src="${p.image_url}">` : ""}
`;

}

/* RENDER */
function render(){

const book=document.getElementById("book");
book.innerHTML="";

pages.forEach((p,i)=>{

const div=document.createElement("div");

div.className="page " + (i%2===0?"left":"right");

if(i<current){
div.classList.add("flipped");
}

div.innerHTML=build(p);

book.appendChild(div);

});

}

/* NAV */
window.next = ()=>{
if(current < pages.length){
current++;
render();
}
}

window.prev = ()=>{
if(current > 0){
current--;
render();
}
}

/* SWIPE MOBILE */
let startX=0;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX - endX > 50) next();
if(endX - startX > 50) prev();
});

/* INIT */
render();

</script>

</body>
</html>
