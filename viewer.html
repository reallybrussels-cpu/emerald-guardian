<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Vault</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

/* CONTAINER */
#container{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CANVAS */
canvas{
max-width:100%;
max-height:100vh;
transition: transform 0.3s ease;
}

/* 🔥 ÁREAS LATERAIS (CLICK ZONE) */
.zone{
position:fixed;
top:0;
width:20%;
height:100vh;
z-index:10;
cursor:pointer;
}

#leftZone{ left:0; }
#rightZone{ right:0; }

/* ZOOM */
.zoom-controls{
position:fixed;
top:20px;
right:20px;
z-index:20;
}

button{
background:none;
border:1px solid gold;
color:gold;
padding:8px;
margin:3px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="container">
  <canvas id="pdf"></canvas>
</div>

<!-- 🔥 ZONAS DE CLIQUE -->
<div id="leftZone" class="zone"></div>
<div id="rightZone" class="zone"></div>

<!-- 🔍 ZOOM -->
<div class="zoom-controls">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const url = 'guardiao.pdf';

let pdfDoc = null;
let pageNum = 1;
let scale = 1;
let baseScale = 1;

/* LOAD PDF */
pdfjsLib.getDocument(url).promise.then(pdf=>{
  pdfDoc = pdf;
  renderPage(pageNum);
});

/* RENDER */
function renderPage(num){
  pdfDoc.getPage(num).then(page=>{
    const canvas = document.getElementById('pdf');
    const ctx = canvas.getContext('2d');

    const viewport = page.getViewport({ scale: 1 });

    baseScale = Math.min(
      window.innerWidth / viewport.width,
      window.innerHeight / viewport.height
    );

    const finalScale = baseScale * scale;
    const scaledViewport = page.getViewport({ scale: finalScale });

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    page.render({
      canvasContext: ctx,
      viewport: scaledViewport
    });

    track();
  });
}

/* NAV */
function next(){
  if(pageNum < pdfDoc.numPages){
    pageNum++;
    flipEffect();
  }
}

function prev(){
  if(pageNum > 1){
    pageNum--;
    flipEffect();
  }
}

/* 🔥 EFEITO FLIP */
function flipEffect(){
  const canvas = document.getElementById('pdf');
  canvas.style.transform = "rotateY(90deg)";
  setTimeout(()=>{
    renderPage(pageNum);
    canvas.style.transform = "rotateY(0deg)";
  },150);
}

/* ZOOM */
function zoomIn(){
  scale += 0.2;
  renderPage(pageNum);
}

function zoomOut(){
  scale = Math.max(1, scale - 0.2);
  renderPage(pageNum);
}

/* CLICK ZONES */
document.getElementById("leftZone").onclick = prev;
document.getElementById("rightZone").onclick = next;

/* 🔁 RESIZE */
window.addEventListener("resize",()=>{
  renderPage(pageNum);
});

/* 🔥 PRELOAD (SIMPLES) */
function preload(){
  if(pageNum < pdfDoc.numPages){
    pdfDoc.getPage(pageNum + 1);
  }
}

/* 📊 TRACKING */
function track(){
  console.log("Page:", pageNum);
  preload();
}

/* 🔒 BLOQUEIOS */
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",e=>{
if(e.ctrlKey && ["s","u","c"].includes(e.key)) e.preventDefault();
});
</script>

</body>
</html>
