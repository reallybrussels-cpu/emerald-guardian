<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Vault</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

/* CONTAINER CENTRAL */
#container{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

/* CANVAS */
canvas{
max-height:90vh;
box-shadow:0 0 30px rgba(255,255,255,0.1);
}

/* SETAS */
.arrow{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:gold;
cursor:pointer;
z-index:20;
user-select:none;
}

#leftArrow{ left:20px; }
#rightArrow{ right:20px; }

/* ZOOM */
.zoom{
position:fixed;
top:20px;
right:20px;
z-index:30;
}

button{
background:none;
border:1px solid gold;
color:gold;
padding:8px;
margin:3px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="container">
  <canvas id="leftPage"></canvas>
  <canvas id="rightPage"></canvas>
</div>

<!-- SETAS VISÍVEIS -->
<div id="leftArrow" class="arrow">❮</div>
<div id="rightArrow" class="arrow">❯</div>

<!-- ZOOM -->
<div class="zoom">
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

const url = 'guardiao.pdf';

let pdfDoc = null;
let pageNum = 1;
let scale = 1;
let baseScale = 1;

/* LOAD */
pdfjsLib.getDocument(url).promise.then(pdf=>{
  pdfDoc = pdf;
  renderSpread();
});

/* RENDER DUPLA */
function renderSpread(){

renderPage(pageNum, "leftPage");
renderPage(pageNum + 1, "rightPage");

preload();
}

/* RENDER PAGE */
function renderPage(num, canvasId){

if(num > pdfDoc.numPages){
document.getElementById(canvasId).style.display = "none";
return;
}

const canvas = document.getElementById(canvasId);
canvas.style.display = "block";

pdfDoc.getPage(num).then(page=>{
const ctx = canvas.getContext('2d');

const viewport = page.getViewport({ scale: 1 });

baseScale = Math.min(
window.innerWidth / (viewport.width * 2),
window.innerHeight / viewport.height
);

const finalScale = baseScale * scale;
const scaledViewport = page.getViewport({ scale: finalScale });

canvas.width = scaledViewport.width;
canvas.height = scaledViewport.height;

page.render({
canvasContext: ctx,
viewport: scaledViewport
});
});
}

/* NAVEGAÇÃO */
function next(){
if(pageNum + 2 <= pdfDoc.numPages){
pageNum += 2;
flip();
}
}

function prev(){
if(pageNum - 2 >= 1){
pageNum -= 2;
flip();
}
}

/* FLIP SIMPLES */
function flip(){
const container = document.getElementById("container");
container.style.transform = "scaleX(0.95)";
setTimeout(()=>{
renderSpread();
container.style.transform = "scaleX(1)";
},150);
}

/* ZOOM */
function zoomIn(){
scale += 0.2;
renderSpread();
}

function zoomOut(){
scale = Math.max(1, scale - 0.2);
renderSpread();
}

/* SETAS */
document.getElementById("leftArrow").onclick = prev;
document.getElementById("rightArrow").onclick = next;

/* PRELOAD */
function preload(){
if(pageNum + 2 <= pdfDoc.numPages){
pdfDoc.getPage(pageNum + 2);
}
}

/* RESIZE */
window.addEventListener("resize",()=>{
renderSpread();
});

/* BLOQUEIO */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
if(e.ctrlKey && ["s","u","c"].includes(e.key)) e.preventDefault();
});

</script>

</body>
</html>
