<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Access Logs</title>

<style>
body{
  font-family:Arial;
  background:#000;
  color:#d4af37;
  padding:30px;
}
.log{
  background:#111;
  padding:15px;
  margin:10px 0;
  border-left:4px solid gold;
}
.small{
  color:#aaa;
  font-size:12px;
}
</style>
</head>

<body>

<h1>ACCESS LOGS (QR VIP)</h1>
<div id="logs"></div>

<script>

function gerarLogs(){

  const perfis = [
    {nome:"VIP Switzerland", pais:"Switzerland", qtd:18},
    {nome:"VIP USA", pais:"United States", qtd:12},
    {nome:"VIP Russia", pais:"Russia", qtd:8},
    {nome:"VIP Italy", pais:"Italy", qtd:10},
    {nome:"VIP Germany", pais:"Germany", qtd:8},
    {nome:"VIP France", pais:"France", qtd:8},
    {nome:"VIP Canada", pais:"Canada", qtd:6},
    {nome:"VIP UAE", pais:"United Arab Emirates", qtd:6},
    {nome:"VIP Saudi", pais:"Saudi Arabia", qtd:5},
    {nome:"VIP India", pais:"India", qtd:5},
    {nome:"VIP Denmark", pais:"Denmark", qtd:4},
    {nome:"VIP Netherlands", pais:"Netherlands", qtd:4},
    {nome:"VIP Ireland", pais:"Ireland", qtd:3},
    {nome:"VIP Mexico", pais:"Mexico", qtd:3},
    {nome:"VIP Brazil", pais:"Brazil", qtd:3},
    {nome:"VIP Japan", pais:"Japan", qtd:4},
    {nome:"VIP China", pais:"China", qtd:4},
    {nome:"VIP South Africa", pais:"South Africa", qtd:3},
    {nome:"VIP Argentina", pais:"Argentina", qtd:3},
    {nome:"VIP Chile", pais:"Chile", qtd:3}
  ];

  const dispositivos = ["iPhone","Android","Desktop","Tablet"];
  const logs = [];

  const inicio = 9 * 60;
  const fim = 16 * 60 + 30;

  perfis.forEach(p => {

    for(let i=0;i<p.qtd;i++){

      const minutosTotal = Math.floor(Math.random() * (fim - inicio)) + inicio;

      const horas = Math.floor(minutosTotal / 60).toString().padStart(2,'0');
      const minutos = (minutosTotal % 60).toString().padStart(2,'0');

      logs.push({
        token: "VIP-"+(Math.floor(Math.random()*9999)),
        nome: p.nome,
        pais: p.pais,
        dispositivo: dispositivos[Math.floor(Math.random()*dispositivos.length)],
        data: `29/04/2026 ${horas}:${minutos}`
      });
    }

  });

  return logs;
}


// RENDER
const container = document.getElementById("logs");

const logs = gerarLogs();

// ordenar por horário
logs.sort((a,b)=>{
  return b.data.localeCompare(a.data);
});

logs.forEach(log => {

  const div = document.createElement("div");
  div.className = "log";

  div.innerHTML = `
    <b>${log.token}</b><br>
    Nome: ${log.nome}<br>
    País: ${log.pais}<br>
    Dispositivo: ${log.dispositivo}<br>
    <span class="small">Acesso em: ${log.data}</span>
  `;

  container.appendChild(div);
});

</script>

</body>
</html>
