<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: hidden;
}

/* CENTRAL */
.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

.login-box input {
    padding: 10px;
    margin-top: 10px;
    width: 200px;
}

.login-box button {
    margin-top: 15px;
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* CAPA */
#capa {
    display: none;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
    cursor: pointer;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#flipbook {
    width: 1000px;
    height: 650px;
}

/* IMAGENS */
#flipbook img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: zoom-in;
}

/* LIGHTBOX */
#zoomOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    justify-content: center;
    align-items: center;
}

#zoomImg {
    max-width: none;
    max-height: none;
    cursor: grab;
    transform-origin: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg" onclick="abrirFlip()">
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div></div>

        <!-- PAGINAS -->
        <script>
        for(let i=2;i<=28;i++){
            document.write(`<div><img src="guardiao_page-${String(i).padStart(4,'0')}.jpg" onclick="zoom(this)"></div>`);
        }
        </script>

    </div>
</div>

<!-- ZOOM -->
<div id="zoomOverlay" onclick="fecharZoom()">
    <img id="zoomImg">
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();

    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    $('#flipbook').turn({
        width: 1000,
        height: 650,
        autoCenter: true,
        display: 'double'
    });

    $('#flipbook').turn('page', 2);
}

/* CLICK PARA VIRAR */
document.addEventListener("click", function(e) {
    if (document.getElementById("flip-container").style.display === "flex" &&
        e.target.tagName !== "IMG") {

        let largura = window.innerWidth;
        if (e.clientX > largura/2) {
            $('#flipbook').turn('next');
        } else {
            $('#flipbook').turn('previous');
        }
    }
});

/* ZOOM */
let escala = 1;
let posX = 0;
let posY = 0;

function zoom(img) {
    let overlay = document.getElementById("zoomOverlay");
    let zoomImg = document.getElementById("zoomImg");

    zoomImg.src = img.src;
    overlay.style.display = "flex";

    escala = 1;
    posX = 0;
    posY = 0;

    aplicarTransform();
}

function fecharZoom() {
    document.getElementById("zoomOverlay").style.display = "none";
}

/* ZOOM SCROLL */
document.addEventListener("wheel", function(e) {
    if (document.getElementById("zoomOverlay").style.display === "flex") {
        e.preventDefault();
        escala += e.deltaY * -0.001;
        escala = Math.min(Math.max(1, escala), 5);
        aplicarTransform();
    }
}, { passive: false });

/* DRAG */
let arrastando = false;

document.addEventListener("mousedown", () => arrastando = true);
document.addEventListener("mouseup", () => arrastando = false);

document.addEventListener("mousemove", function(e) {
    if (arrastando && document.getElementById("zoomOverlay").style.display === "flex") {
        posX += e.movementX;
        posY += e.movementY;
        aplicarTransform();
    }
});

function aplicarTransform() {
    let zoomImg = document.getElementById("zoomImg");
    zoomImg.style.transform = `translate(${posX}px, ${posY}px) scale(${escala})`;
}

/* ESC */
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") fecharZoom();
});
</script>

</body>
</html>
