<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipbook Premium</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

/* CONTAINER */
#flipbook{
width:1000px;
height:700px;
}

/* SETAS */
.arrow{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:50px;
color:gold;
cursor:pointer;
z-index:20;
user-select:none;
}

#leftArrow{ left:20px; }
#rightArrow{ right:20px; }

.arrow:hover{
opacity:0.7;
}
</style>

</head>

<body>

<div id="flipbook"></div>

<!-- SETAS -->
<div id="leftArrow" class="arrow">❮</div>
<div id="rightArrow" class="arrow">❯</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>

window.addEventListener("load", () => {

const flipbook = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 500,
height: 700,
size: "stretch",
showCover: true,
usePortrait: true, // 🔥 CENTRALIZA CAPA
drawShadow: true,
flippingTime: 800
}
);

/* 🔥 PÁGINAS */
const pages = [];

for(let i=1; i<=28; i++){
let num = String(i).padStart(4,'0');
pages.push(`guardiao_page-${num}.jpg`);
}

/* 🔥 LOAD */
flipbook.loadFromImages(pages);

/* 🔥 AJUSTE DA CAPA */
flipbook.on("init", () => {
  if (flipbook.getCurrentPageIndex() === 0) {
    flipbook.updateState(St.PageFlipState.READ);
  }
});

/* 🔥 SETAS */
document.getElementById("leftArrow").onclick = () => flipbook.flipPrev();
document.getElementById("rightArrow").onclick = () => flipbook.flipNext();

});

</script>

</body>
</html>
