<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipbook</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#flipbook{
width:1000px;
height:700px;
}

/* DEBUG */
#loading{
position:absolute;
color:white;
font-size:20px;
}
</style>

</head>

<body>

<div id="loading">Carregando...</div>
<div id="flipbook"></div>

<!-- LIB LOCAL MAIS ESTÁVEL -->
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>

window.addEventListener("load", () => {

try{

const flipbook = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 500,
height: 700,
size: "stretch",
showCover: true,
drawShadow: true,
flippingTime: 800
}
);

/* 🔥 IMAGENS DIRETAS */
flipbook.loadFromImages([
"guardiao_page-0001.jpg",
"guardiao_page-0002.jpg",
"guardiao_page-0003.jpg",
"guardiao_page-0004.jpg",
"guardiao_page-0005.jpg",
"guardiao_page-0006.jpg"
]);

document.getElementById("loading").style.display = "none";

}catch(e){

document.getElementById("loading").innerText = "Erro: " + e;

console.error(e);

}

});

</script>

</body>
</html>
