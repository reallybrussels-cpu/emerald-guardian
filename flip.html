<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

.login-box input {
    padding: 10px;
    margin-top: 10px;
    width: 200px;
}

.login-box button {
    margin-top: 15px;
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* CAPA */
#capa {
    display: none;
    position: relative;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
}

/* SETA */
#entrarFlip {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: white;
    cursor: pointer;
    user-select: none;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#flipbook {
    width: 900px;
    height: 600px;
}

#flipbook div {
    width: 100%;
    height: 100%;
}

#flipbook img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg">
    <div id="entrarFlip" onclick="abrirFlip()">➤</div>
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div><img src="guardiao_page-0002.jpg"></div>
        <div><img src="guardiao_page-0003.jpg"></div>
        <div><img src="guardiao_page-0004.jpg"></div>
        <div><img src="guardiao_page-0005.jpg"></div>
        <div><img src="guardiao_page-0006.jpg"></div>
        <div><img src="guardiao_page-0007.jpg"></div>
        <div><img src="guardiao_page-0008.jpg"></div>
        <div><img src="guardiao_page-0009.jpg"></div>
        <div><img src="guardiao_page-0010.jpg"></div>
        <div><img src="guardiao_page-0011.jpg"></div>

    </div>
</div>

<!-- SCRIPTS CORRETOS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();

    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    carregarFlip();
}

function carregarFlip() {
    let imagens = document.querySelectorAll("#flipbook img");
    let carregadas = 0;

    imagens.forEach(img => {
        if (img.complete) {
            carregadas++;
        } else {
            img.onload = () => {
                carregadas++;
                if (carregadas === imagens.length) iniciarFlip();
            };
        }
    });

    if (carregadas === imagens.length) {
        iniciarFlip();
    }
}

function iniciarFlip() {

    if (typeof $.fn.turn !== "function") {
        alert("Erro: turn.js não carregou");
        return;
    }

    $('#flipbook').turn({
        width: 900,
        height: 600,
        autoCenter: true,
        elevation: 50,
        gradients: true
    });

    console.log("Flip funcionando");
}
</script>

</body>
</html>
