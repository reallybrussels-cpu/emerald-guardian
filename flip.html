<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
}

.center {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGIN */
.login-box {
    background:#111;
    padding:40px;
    border-radius:10px;
    text-align:center;
}

/* CAPA */
#capa { display:none; }
#capa img {
    max-width:90%;
    max-height:90vh;
    cursor:pointer;
}

/* FLIP */
#flip-container {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    position:relative;
}

#flipbook {
    width:1000px;
    height:650px;
}

/* IMAGENS */
#flipbook img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* SETAS */
#nav-left, #nav-right {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:60px;
    color:rgba(255,255,255,0.75);
    cursor:pointer;
    z-index:20;
    display:none;
    padding:20px;
}

#nav-left { left:calc(50% - 550px); }
#nav-right { right:calc(50% - 550px); }

#nav-left:hover, #nav-right:hover {
    color:#fff;
}

/* ZOOM */
#zoomOverlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

#zoomImg {
    cursor:grab;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha">
        <br><br>
        <button id="btnEntrar">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img id="imgCapa" src="guardiao_page-0001.jpg">
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div><img src="guardiao_page-0002.jpg"></div>
        <div><img src="guardiao_page-0003.jpg"></div>

        <div><img src="guardiao_page-0004.jpg"></div>
        <div><img src="guardiao_page-0005.jpg"></div>

        <div><img src="guardiao_page-0006.jpg"></div>
        <div><img src="guardiao_page-0007.jpg"></div>

        <div><img src="guardiao_page-0008.jpg"></div>
        <div><img src="guardiao_page-0009.jpg"></div>

        <div><img src="guardiao_page-0010.jpg"></div>
        <div><img src="guardiao_page-0011.jpg"></div>

        <div><img src="guardiao_page-0012.jpg"></div>
        <div><img src="guardiao_page-0013.jpg"></div>

        <div><img src="guardiao_page-0014.jpg"></div>
        <div><img src="guardiao_page-0015.jpg"></div>

        <div><img src="guardiao_page-0016.jpg"></div>
        <div><img src="guardiao_page-0017.jpg"></div>

        <div><img src="guardiao_page-0018.jpg"></div>
        <div><img src="guardiao_page-0019.jpg"></div>

        <div><img src="guardiao_page-0020.jpg"></div>
        <div><img src="guardiao_page-0021.jpg"></div>

        <div><img src="guardiao_page-0022.jpg"></div>
        <div><img src="guardiao_page-0023.jpg"></div>

        <div><img src="guardiao_page-0024.jpg"></div>
        <div><img src="guardiao_page-0025.jpg"></div>

        <div><img src="guardiao_page-0026.jpg"></div>
        <div><img src="guardiao_page-0027.jpg"></div>

        <div><img src="guardiao_page-0028.jpg"></div>
        <div style="background:#000;"></div>

    </div>
</div>

<!-- SETAS -->
<div id="nav-left">‹</div>
<div id="nav-right">›</div>

<!-- ZOOM -->
<div id="zoomOverlay">
    <img id="zoomImg">
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const btnEntrar = document.getElementById("btnEntrar");
    const inputSenha = document.getElementById("senha");
    const login = document.getElementById("login");
    const capa = document.getElementById("capa");
    const flipContainer = document.getElementById("flip-container");
    const navLeft = document.getElementById("nav-left");
    const navRight = document.getElementById("nav-right");
    const imgCapa = document.getElementById("imgCapa");

    let flipIniciado = false;

    function entrar(){
        let s = inputSenha.value.trim().toUpperCase();

        if(s === "GV2026" || s === "1234"){
            login.style.display = "none";
            capa.style.display = "flex";
        } else {
            alert("Senha incorreta");
        }
    }

    function abrirFlip(){
        capa.style.display = "none";
        flipContainer.style.display = "flex";

        navLeft.style.display = "block";
        navRight.style.display = "block";

        if(!flipIniciado){
            $('#flipbook').turn({
                width:1000,
                height:650,
                autoCenter:true,
                display:'double'
            });

            $('#flipbook').turn('page', 1);

            flipIniciado = true;
        }
    }

    btnEntrar.onclick = entrar;
    inputSenha.addEventListener("keydown", function(e){
        if(e.key === "Enter") entrar();
    });

    imgCapa.onclick = abrirFlip;

    navRight.onclick = function(){
        let p = $('#flipbook').turn('page');
        $('#flipbook').turn('page', p + 2);
    };

    navLeft.onclick = function(){
        let p = $('#flipbook').turn('page');

        if(p <= 2){
            flipContainer.style.display = "none";
            capa.style.display = "flex";
            navLeft.style.display = "none";
            navRight.style.display = "none";
        } else {
            $('#flipbook').turn('page', p - 2);
        }
    };

});
</script>

</body>
</html>
