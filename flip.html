<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipbook</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#flipbook{
width:1000px;
height:700px;
}

/* páginas */
.page{
background:black;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}
</style>

</head>

<body>

<div id="flipbook"></div>

<!-- 🔥 BIBLIOTECA CORRETA -->
<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

/* 🔥 AGUARDA CARREGAR */
window.onload = function(){

const container = document.getElementById("flipbook");

/* 🔥 INICIALIZA */
const pageFlip = new St.PageFlip(container, {
width: 500,
height: 700,
size: "stretch",
showCover: true,
drawShadow: true,
flippingTime: 800
});

/* 🔥 LISTA REAL (SEUS ARQUIVOS) */
const pages = [
"guardiao_page-0001.jpg",
"guardiao_page-0002.jpg",
"guardiao_page-0003.jpg",
"guardiao_page-0004.jpg",
"guardiao_page-0005.jpg",
"guardiao_page-0006.jpg"
];

/* 🔥 CRIA ELEMENTOS */
const pageElements = pages.map(src => {
const div = document.createElement("div");
div.className = "page";

const img = document.createElement("img");
img.src = src;

div.appendChild(img);
return div;
});

/* 🔥 CARREGA */
pageFlip.loadFromHTML(pageElements);

};

</script>

</body>
</html>
