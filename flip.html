<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

/* CENTRALIZAÇÃO */
.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

.login-box input {
    padding: 10px;
    margin-top: 10px;
    width: 200px;
}

.login-box button {
    margin-top: 15px;
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* CAPA */
#capa {
    display: none;
    text-align: center;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
}

/* BOTÃO AVANÇAR */
#entrarFlip {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: white;
    cursor: pointer;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#flipbook {
    width: 900px;
    height: 600px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg">
    <div id="entrarFlip" onclick="abrirFlip()">➤</div>
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div><img src="guardiao_page-0002.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0003.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0004.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0005.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0006.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0007.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0008.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0009.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0010.jpg" style="width:100%"></div>
        <div><img src="guardiao_page-0011.jpg" style="width:100%"></div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();

    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    setTimeout(() => {
        $('#flipbook').turn({
            width: 900,
            height: 600,
            autoCenter: true
        });
    }, 300);
}
</script>

</body>
</html>
