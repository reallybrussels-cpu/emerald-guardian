<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Vault</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* LOGIN */
#login{
text-align:center;
}

input{
padding:10px;
margin:10px;
background:black;
border:1px solid gold;
color:gold;
}

button{
padding:10px 20px;
background:none;
border:1px solid gold;
color:gold;
cursor:pointer;
}

/* FLIP */
#app{
display:none;
width:100%;
height:100vh;
}

/* CONTAINER */
#flipbook{
width:1000px;
height:700px;
margin:auto;
}

/* SETAS */
.arrow{
position:fixed;
top:50%;
transform:translateY(-50%);
font-size:50px;
color:gold;
cursor:pointer;
z-index:20;
}

#leftArrow{ left:20px; }
#rightArrow{ right:20px; }

</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
<h2>Private Access</h2>
<input type="password" id="password" placeholder="Enter password">
<br>
<button onclick="check()">Enter</button>
</div>

<!-- 🚀 APP -->
<div id="app">
<div id="flipbook"></div>

<div id="leftArrow" class="arrow">❮</div>
<div id="rightArrow" class="arrow">❯</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<script>

/* 🔐 SENHA (VOCÊ DEFINE AQUI) */
const ACCESS_PASSWORD = "GV2026";

/* 🔐 CHECK */
function check(){

const input = document.getElementById("password").value;

if(input === ACCESS_PASSWORD){

localStorage.setItem("vault_access", "ok");

start();

}else{
alert("Senha incorreta");
}

}

/* 🔐 AUTO LOGIN */
if(localStorage.getItem("vault_access") === "ok"){
start();
}

/* 🚀 INICIA FLIP */
function start(){

document.getElementById("login").style.display = "none";
document.getElementById("app").style.display = "block";

const flipbook = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 500,
height: 700,
size: "stretch",
showCover: true,
drawShadow: true,
flippingTime: 800
}
);

const pages = [];

for(let i=1; i<=28; i++){
let num = String(i).padStart(4,'0');
pages.push(`guardiao_page-${num}.jpg`);
}

flipbook.loadFromImages(pages);

document.getElementById("leftArrow").onclick = () => flipbook.flipPrev();
document.getElementById("rightArrow").onclick = () => flipbook.flipNext();

}

</script>

</body>
</html>
