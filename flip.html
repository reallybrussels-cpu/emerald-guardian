<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: hidden;
}

/* CENTRAL */
.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

/* CAPA */
#capa {
    display: none;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
    cursor: pointer;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    position: relative;
}

#flipbook {
    width: 1000px;
    height: 650px;
}

/* IMAGENS */
#flipbook img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: zoom-in;
}

/* ZOOM */
#zoomOverlay {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

#zoomImg {
    cursor: grab;
    transform-origin: center;
}

/* SETAS CORRETAS */
#nav-left, #nav-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    z-index: 20;
    display: none;
    padding: 20px;
}

/* COLADAS NO LIVRO */
#nav-left {
    left: calc(50% - 550px);
}

#nav-right {
    right: calc(50% - 550px);
}

#nav-left:hover, #nav-right:hover {
    color: rgba(255,255,255,0.9);
    transform: translateY(-50%) scale(1.15);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg" onclick="abrirFlip()">
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div><img src="guardiao_page-0002.jpg"></div>
        <div><img src="guardiao_page-0003.jpg"></div>
        <div><img src="guardiao_page-0004.jpg"></div>
        <div><img src="guardiao_page-0005.jpg"></div>
        <div><img src="guardiao_page-0006.jpg"></div>
        <div><img src="guardiao_page-0007.jpg"></div>
        <div><img src="guardiao_page-0008.jpg"></div>
        <div><img src="guardiao_page-0009.jpg"></div>
        <div><img src="guardiao_page-0010.jpg"></div>
        <div><img src="guardiao_page-0011.jpg"></div>
        <div><img src="guardiao_page-0012.jpg"></div>
        <div><img src="guardiao_page-0013.jpg"></div>
        <div><img src="guardiao_page-0014.jpg"></div>
        <div><img src="guardiao_page-0015.jpg"></div>
        <div><img src="guardiao_page-0016.jpg"></div>
        <div><img src="guardiao_page-0017.jpg"></div>
        <div><img src="guardiao_page-0018.jpg"></div>
        <div><img src="guardiao_page-0019.jpg"></div>
        <div><img src="guardiao_page-0020.jpg"></div>
        <div><img src="guardiao_page-0021.jpg"></div>
        <div><img src="guardiao_page-0022.jpg"></div>
        <div><img src="guardiao_page-0023.jpg"></div>
        <div><img src="guardiao_page-0024.jpg"></div>
        <div><img src="guardiao_page-0025.jpg"></div>
        <div><img src="guardiao_page-0026.jpg"></div>
        <div><img src="guardiao_page-0027.jpg"></div>
        <div><img src="guardiao_page-0028.jpg"></div>

    </div>
</div>

<!-- SETAS -->
<div id="nav-left">‹</div>
<div id="nav-right">›</div>

<!-- ZOOM -->
<div id="zoomOverlay" onclick="fecharZoom()">
    <img id="zoomImg">
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
let flipInicializado = false;

function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();
    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    document.getElementById("nav-left").style.display = "block";
    document.getElementById("nav-right").style.display = "block";

    if(!flipInicializado){
        $('#flipbook').turn({
            width: 1000,
            height: 650,
            autoCenter: true,
            display: 'double'
        });
        flipInicializado = true;
    }
}

/* SETAS */
document.getElementById("nav-left").onclick = function() {

    let pagina = $('#flipbook').turn('page');

    if(pagina <= 2){
        $('#flipbook').turn('page', 1);
        document.getElementById("flip-container").style.display = "none";
        document.getElementById("capa").style.display = "flex";
        document.getElementById("nav-left").style.display = "none";
        document.getElementById("nav-right").style.display = "none";
    } else {
        $('#flipbook').turn('previous');
    }
};

document.getElementById("nav-right").onclick = function() {
    $('#flipbook').turn('next');
};

/* ZOOM GLOBAL */
document.querySelectorAll("#flipbook img").forEach(img => {
    img.addEventListener("click", function(e){
        e.stopPropagation();
        zoom(this);
    });
});

let escala=1, posX=0, posY=0;

function zoom(img){
    let z=document.getElementById("zoomOverlay");
    let zi=document.getElementById("zoomImg");

    zi.src=img.src;
    z.style.display="flex";

    escala=1; posX=0; posY=0;
    aplicar();
}

function fecharZoom(){
    document.getElementById("zoomOverlay").style.display="none";
}

document.addEventListener("wheel",function(e){
    if(document.getElementById("zoomOverlay").style.display==="flex"){
        e.preventDefault();
        escala+=e.deltaY*-0.001;
        escala=Math.min(Math.max(1,escala),5);
        aplicar();
    }
},{passive:false});

let drag=false;

document.addEventListener("mousedown",()=>drag=true);
document.addEventListener("mouseup",()=>drag=false);

document.addEventListener("mousemove",function(e){
    if(drag && document.getElementById("zoomOverlay").style.display==="flex"){
        posX+=e.movementX;
        posY+=e.movementY;
        aplicar();
    }
});

function aplicar(){
    document.getElementById("zoomImg").style.transform =
        `translate(${posX}px,${posY}px) scale(${escala})`;
}
</script>

</body>
</html>
