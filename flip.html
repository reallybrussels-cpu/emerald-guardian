<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook Premium</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
}

/* CENTRALIZAÇÃO GLOBAL */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #1a1a1a;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.login-box input {
    padding: 10px;
    width: 200px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

.login-box button {
    margin-top: 15px;
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

/* FLIPBOOK */
#flip-container {
    display: none;
    width: 100%;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#flipbook {
    width: 90%;
    max-width: 900px;
    height: 600px;
}
</style>
</head>

<body>

<div class="wrapper" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<div id="flip-container">
    <div id="flipbook">
        <div><img src="pagina1.jpg" style="width:100%"></div>
        <div><img src="pagina2.jpg" style="width:100%"></div>
        <div><img src="pagina3.jpg" style="width:100%"></div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Turn.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value;

    if(senha === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("flip-container").style.display = "flex";

        setTimeout(() => {
            $('#flipbook').turn({
                width: 900,
                height: 600,
                autoCenter: true
            });
        }, 200);

    } else {
        alert("Senha incorreta");
    }
}
</script>

</body>
</html>
