<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: hidden;
}

/* CENTRAL */
.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

/* CAPA */
#capa {
    display: none;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
    cursor: pointer;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

#flipbook {
    width: 1000px;
    height: 650px;
}

/* PAGINAS */
#flipbook div {
    width: 100%;
    height: 100%;
}

#flipbook img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: zoom-in;
}

/* ZOOM */
#zoomOverlay {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

#zoomImg {
    cursor: grab;
    transform-origin: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg" onclick="abrirFlip()">
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="flipbook">

        <div></div>

        <div><img src="guardiao_page-0002.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0003.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0004.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0005.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0006.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0007.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0008.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0009.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0010.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0011.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0012.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0013.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0014.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0015.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0016.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0017.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0018.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0019.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0020.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0021.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0022.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0023.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0024.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0025.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0026.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0027.jpg" onclick="zoom(this)"></div>
        <div><img src="guardiao_page-0028.jpg" onclick="zoom(this)"></div>

    </div>
</div>

<!-- ZOOM -->
<div id="zoomOverlay" onclick="fecharZoom()">
    <img id="zoomImg">
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();
    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    $('#flipbook').turn({
        width: 1000,
        height: 650,
        autoCenter: true,
        display: 'double'
    });

    $('#flipbook').turn('page', 2);
}

/* CLICK VIRAR */
document.addEventListener("click", function(e) {
    if (e.target.tagName !== "IMG" && document.getElementById("flip-container").style.display === "flex") {
        if (e.clientX > window.innerWidth/2) {
            $('#flipbook').turn('next');
        } else {
            $('#flipbook').turn('previous');
        }
    }
});

/* ZOOM */
let escala=1, posX=0, posY=0;

function zoom(img){
    let z=document.getElementById("zoomOverlay");
    let zi=document.getElementById("zoomImg");

    zi.src=img.src;
    z.style.display="flex";

    escala=1; posX=0; posY=0;
    aplicar();
}

function fecharZoom(){
    document.getElementById("zoomOverlay").style.display="none";
}

document.addEventListener("wheel",function(e){
    if(document.getElementById("zoomOverlay").style.display==="flex"){
        e.preventDefault();
        escala+=e.deltaY*-0.001;
        escala=Math.min(Math.max(1,escala),5);
        aplicar();
    }
},{passive:false});

let drag=false;

document.addEventListener("mousedown",()=>drag=true);
document.addEventListener("mouseup",()=>drag=false);

document.addEventListener("mousemove",function(e){
    if(drag && document.getElementById("zoomOverlay").style.display==="flex"){
        posX+=e.movementX;
        posY+=e.movementY;
        aplicar();
    }
});

function aplicar(){
    document.getElementById("zoomImg").style.transform =
        `translate(${posX}px,${posY}px) scale(${escala})`;
}
</script>

</body>
</html>
