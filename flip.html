<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipbook</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
#flipbook{
width:1000px;
height:700px;
}
.page img{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<div id="flipbook"></div>

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

window.onload = function(){

const flipbook = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 500,
height: 700,
showCover: true,
drawShadow: true
}
);

flipbook.loadFromImages([
"guardiao_page-0001.jpg",
"guardiao_page-0002.jpg",
"guardiao_page-0003.jpg",
"guardiao_page-0004.jpg",
"guardiao_page-0005.jpg",
"guardiao_page-0006.jpg"
]);

};

</script>

</body>
</html>
