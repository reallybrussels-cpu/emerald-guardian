<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Flipbook</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */
#flipbook{
width:90%;
height:90vh;
}

/* IMAGENS */
.page{
width:100%;
height:100%;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}
</style>

</head>

<body>

<div id="flipbook"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 600,
height: 800,
size: "stretch",
minWidth: 300,
maxWidth: 1200,
minHeight: 400,
maxHeight: 1600,
showCover: true,
usePortrait: true,
startPage: 0,
drawShadow: true,
flippingTime: 700,
useMouseEvents: true
}
);

/* LISTA DE PÁGINAS */
const pages = [];

for(let i=1;i<=20;i++){ // ajuste para quantidade real
pages.push(`
<div class="page">
<img src="pages/page_${i}.jpg">
</div>
`);
}

pageFlip.loadFromHTML(pages);

</script>

</body>
</html>
