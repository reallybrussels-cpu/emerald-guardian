<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Flipbook</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CONTAINER */
#flipbook{
width:90%;
height:90vh;
}

/* PÁGINAS */
.page{
width:100%;
height:100%;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}
</style>

</head>

<body>

<div id="flipbook"></div>

<!-- LIB DO FLIP -->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

/* 🔥 INICIALIZAÇÃO */
const pageFlip = new St.PageFlip(
document.getElementById("flipbook"),
{
width: 600,
height: 800,
size: "stretch",
minWidth: 300,
maxWidth: 1400,
minHeight: 400,
maxHeight: 1600,
showCover: true, // 🔥 CAPA SOZINHA
usePortrait: true,
startPage: 0,
drawShadow: true,
flippingTime: 700,
useMouseEvents: true
}
);

/* 🔥 SUAS PÁGINAS (EXATAS DO GITHUB) */
const pages = [
"guardiao_page-0001.jpg",
"guardiao_page-0002.jpg",
"guardiao_page-0003.jpg",
"guardiao_page-0004.jpg",
"guardiao_page-0005.jpg",
"guardiao_page-0006.jpg"
];

/* 🔥 MONTA HTML */
const htmlPages = pages.map(img => `
<div class="page">
<img src="${img}">
</div>
`);

/* 🔥 CARREGA NO FLIP */
pageFlip.loadFromHTML(htmlPages);

</script>

</body>
</html>
