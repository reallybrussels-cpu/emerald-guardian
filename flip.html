<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Vault</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN */
.login-box {
    background: #111;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
}

/* CAPA */
#capa {
    display: none;
    position: relative;
}

#capa img {
    max-width: 90%;
    max-height: 90vh;
}

#entrarFlip {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 50px;
    color: white;
    cursor: pointer;
}

/* FLIP */
#flip-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    position: relative;
}

#flipbook {
    width: 1000px;
    height: 650px;
}

#flipbook div {
    width: 100%;
    height: 100%;
}

#flipbook img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SETAS */
.nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 60px;
    color: white;
    cursor: pointer;
}

#prev { left: 20px; }
#next { right: 20px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="login-box">
        <h2 style="color:white;">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha">
        <br>
        <button onclick="entrar()">Entrar</button>
    </div>
</div>

<!-- CAPA -->
<div id="capa" class="center">
    <img src="guardiao_page-0001.jpg">
    <div id="entrarFlip" onclick="abrirFlip()">➤</div>
</div>

<!-- FLIP -->
<div id="flip-container">
    <div id="prev" class="nav" onclick="voltar()">❮</div>
    <div id="next" class="nav" onclick="avancar()">❯</div>

    <div id="flipbook">

        <!-- PÁGINA BRANCA (ESSENCIAL) -->
        <div></div>

        <!-- PAGINAS REAIS -->
        <div><img src="guardiao_page-0002.jpg"></div>
        <div><img src="guardiao_page-0003.jpg"></div>
        <div><img src="guardiao_page-0004.jpg"></div>
        <div><img src="guardiao_page-0005.jpg"></div>
        <div><img src="guardiao_page-0006.jpg"></div>
        <div><img src="guardiao_page-0007.jpg"></div>
        <div><img src="guardiao_page-0008.jpg"></div>
        <div><img src="guardiao_page-0009.jpg"></div>
        <div><img src="guardiao_page-0010.jpg"></div>
        <div><img src="guardiao_page-0011.jpg"></div>
        <div><img src="guardiao_page-0012.jpg"></div>
        <div><img src="guardiao_page-0013.jpg"></div>
        <div><img src="guardiao_page-0014.jpg"></div>
        <div><img src="guardiao_page-0015.jpg"></div>
        <div><img src="guardiao_page-0016.jpg"></div>
        <div><img src="guardiao_page-0017.jpg"></div>
        <div><img src="guardiao_page-0018.jpg"></div>
        <div><img src="guardiao_page-0019.jpg"></div>
        <div><img src="guardiao_page-0020.jpg"></div>
        <div><img src="guardiao_page-0021.jpg"></div>
        <div><img src="guardiao_page-0022.jpg"></div>
        <div><img src="guardiao_page-0023.jpg"></div>
        <div><img src="guardiao_page-0024.jpg"></div>
        <div><img src="guardiao_page-0025.jpg"></div>
        <div><img src="guardiao_page-0026.jpg"></div>
        <div><img src="guardiao_page-0027.jpg"></div>
        <div><img src="guardiao_page-0028.jpg"></div>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>

<script>
function entrar() {
    var senha = document.getElementById("senha").value.trim().toUpperCase();

    if(senha === "GV2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("capa").style.display = "flex";
    } else {
        alert("Senha incorreta");
    }
}

function abrirFlip() {
    document.getElementById("capa").style.display = "none";
    document.getElementById("flip-container").style.display = "flex";

    $('#flipbook').turn({
        width: 1000,
        height: 650,
        autoCenter: true,
        display: 'double',
        elevation: 50,
        gradients: true
    });

    // COMEÇA NA PÁGINA 2 (correto)
    $('#flipbook').turn('page', 2);
}

function avancar() {
    $('#flipbook').turn('next');
}

function voltar() {
    $('#flipbook').turn('previous');
}

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowRight") avancar();
    if (e.key === "ArrowLeft") voltar();
});
</script>

</body>
</html>
