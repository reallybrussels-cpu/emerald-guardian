<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Premium Generator</title>

<style>
body{
  font-family:Arial;
  background:#000;
  color:#d4af37;
  text-align:center;
  padding:40px;
}
input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
}
button{
  padding:12px 20px;
  margin:10px;
  background:gold;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>QR PREMIUM</h1>

<input id="nome" placeholder="Nome (ex: Dubai)">
<input id="max" placeholder="Limite de acessos">
<input id="expire" placeholder="Expiração YYYY-MM-DD">

<button onclick="gerarQR()">GERAR QR</button>

<h3 id="resultado"></h3>
<div id="acoes"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

// =============================
// LOGIN AUTOMÁTICO VIA QR
// =============================
const params = new URLSearchParams(window.location.search);
const tokenURL = params.get("access");

if(tokenURL){

  const { data, error } = await supabase
    .from("access_tokens")
    .select("*")
    .eq("token", tokenURL)
    .eq("ativo", true)
    .single();

  if(!data || error){
    document.body.innerHTML = "<h2>Acesso inválido</h2>";
  }else{

    if(data.expires_at){
      const agora = new Date();
      const exp = new Date(data.expires_at);
      if(agora > exp){
        document.body.innerHTML = "<h2>QR expirado</h2>";
        throw new Error("Expirado");
      }
    }

    if(data.max_uses && data.uses >= data.max_uses){
      document.body.innerHTML = "<h2>Limite de acessos atingido</h2>";
      throw new Error("Limite atingido");
    }

    await supabase
      .from("access_tokens")
      .update({ uses: (data.uses || 0) + 1 })
      .eq("token", tokenURL);

    window.ACCESS_GRANTED = true;

    console.log("ACESSO VIP LIBERADO:", data.nome);

    window.history.replaceState({}, document.title, "/");
  }
}

// ======================
// QR IMAGE
// ======================
async function gerarImagemQR(link, size){
  const qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(link)}`;
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = qrURL;
  await new Promise(res => img.onload = res);
  return img;
}

// ======================
// PREMIUM
// ======================
async function criarQRPremium(link, token, tamanho){
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = tamanho;
  canvas.height = tamanho;

  function loadImg(src){
    return new Promise((resolve, reject)=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=>resolve(img);
      img.onerror = ()=>reject(src);
      img.src = src;
    });
  }

  const bg = await loadImg("./template-premium.png");
  ctx.drawImage(bg, 0, 0, tamanho, tamanho);

  const qrSize = tamanho * 0.60;
  const qrX = (tamanho - qrSize)/2;
  const qrY = tamanho * 0.24;

  const qr = await gerarImagemQR(link, qrSize);
  ctx.drawImage(qr, qrX, qrY, qrSize, qrSize);

  const logo = await loadImg("./puma-escudo.png");

  const logoSize = qrSize * 0.18;
  const cx = qrX + qrSize/2;
  const cy = qrY + qrSize/2;

  
  ctx.drawImage(logo, cx-logoSize/2, cy-logoSize/2, logoSize, logoSize);

  return canvas;
}

// ======================
// DOWNLOAD
// ======================
function baixar(link, token, tamanho){
  criarQRPremium(link, token, tamanho).then(canvas=>{
    const url = canvas.toDataURL("image/png");

    const novaAba = window.open();
    novaAba.document.write(`
      <title>QR ${token}</title>
      <img src="${url}" style="width:100%;max-width:800px;display:block;margin:auto;" />
      <p style="text-align:center;font-family:Arial;">
        Clique com botão direito → Salvar imagem
      </p>
    `);
  });
}

function baixarAuto(link, token){
  baixar(link, token, 2000);
  setTimeout(()=>baixar(link, token, 4000),800);
}

// ======================
// GERAR
// ======================
window.gerarQR = async function(){

  const nome = document.getElementById("nome").value || "VIP";
  const max = parseInt(document.getElementById("max").value) || null;

  let expireInput = document.getElementById("expire").value;
  let expire = null;

  if(expireInput){
    if(expireInput.includes("-")){
      expire = expireInput;
    } else if(expireInput.length === 8){
      expire = `${expireInput.slice(0,4)}-${expireInput.slice(4,6)}-${expireInput.slice(6,8)}`;
    }
  }

  const token = `VIP-${nome}-${Math.floor(Math.random()*10000)}`;

  const { error } = await supabase.from("access_tokens").insert({
    token,
    nome,
    tipo:"vip",
    max_uses:max,
    expires_at:expire,
    ativo:true,
    uses:0
  });

  if(error){
    alert("Erro ao salvar no Supabase");
    return;
  }

  const link = `https://www.projectemeraldvault.com/?access=${token}`;

  document.getElementById("resultado").innerText = token;

  document.getElementById("acoes").innerHTML = `
    <button onclick="baixar('${link}','${token}',2000)">2000px</button>
    <button onclick="baixar('${link}','${token}',4000)">4000px</button>
    <button onclick="baixarAuto('${link}','${token}')">AUTO</button>
  `;
}

window.baixar = baixar;
window.baixarAuto = baixarAuto;

</script>

</body>
</html>
