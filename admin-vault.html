<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:30px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
}

.card{
  background:#fff;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<h1>Vault Admin</h1>

<input id="title" placeholder="Título">
<textarea id="content" placeholder="Conteúdo"></textarea>
<input type="file" id="image">
<input id="order" placeholder="Ordem">

<button onclick="createPage()">Criar Página</button>

<h3 id="msg"></h3>

<hr>

<div id="list"></div>

<hr>

<h2>Access Logs</h2>
<div id="logs"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* 🔐 PROTEÇÃO LOGIN */
const { data: userData } = await supabase.auth.getUser();

if(!userData.user){
  alert("Acesso negado. Faça login.");
  location.href="/";
}

/* LOAD PÁGINAS */
async function load(){

const { data, error } = await supabase
.from("vault_pages")
.select("*")
.order("order_index");

if(error){
console.log(error);
return;
}

const list=document.getElementById("list");
list.innerHTML="";

if(!data || data.length===0){
list.innerHTML="<b>Nenhuma página criada ainda</b>";
return;
}

data.forEach(p=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<strong>${p.title}</strong>
<button onclick="del('${p.id}')">Excluir</button>
`;

list.appendChild(div);
});

}

/* 🔥 LOAD LOGS */
async function loadLogs(){

const { data, error } = await supabase
.from("access_logs")
.select("*")
.order("created_at",{ascending:false})
.limit(50);

if(error){
console.log(error);
return;
}

const logsDiv = document.getElementById("logs");
logsDiv.innerHTML = "";

if(!data || data.length===0){
logsDiv.innerHTML = "<b>Nenhum acesso registrado</b>";
return;
}

data.forEach(l=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${l.token}</b><br>
${new Date(l.created_at).toLocaleString()}<br>
IP: ${l.ip}<br>
${l.user_agent}
`;

logsDiv.appendChild(div);
});

}

/* DELETE */
window.del = async function(id){

if(!confirm("Deseja realmente excluir?")) return;

const { error } = await supabase
.from("vault_pages")
.delete()
.eq("id",id);

if(error){
alert("Erro ao deletar");
console.log(error);
}

load();
loadLogs();
}

/* UPLOAD */
async function upload(file){

if(!file) return null;

try{

const user = (await supabase.auth.getUser()).data.user;

const name = user.id + "/" + Date.now() + "_" + file.name;

const { error: uploadError } = await supabase.storage
.from("vault-assets")
.upload(name,file);

if(uploadError){
console.log(uploadError);
return null;
}

const { data } = supabase.storage
.from("vault-assets")
.getPublicUrl(name);

return data.publicUrl;

}catch(e){
console.log("upload erro",e);
return null;
}

}

/* CREATE */
window.createPage = async function(){

const msg = document.getElementById("msg");
msg.innerText="Salvando...";

try{

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;
const order=parseInt(document.getElementById("order").value) || 0;

const file=document.getElementById("image").files[0];

const image_url = await upload(file);

const { error } = await supabase
.from("vault_pages")
.insert({
title,
content,
image_url,
order_index:order
});

if(error){
msg.innerText="ERRO: "+error.message;
return;
}

msg.innerText="Página criada com sucesso";

load();
loadLogs();

}catch(e){
msg.innerText="Erro geral";
console.log(e);
}

}

/* INIT */
load();
loadLogs();

</script>

</body>
</html>
