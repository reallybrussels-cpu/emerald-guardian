<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:30px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
}

.card{
  background:#fff;
  padding:10px;
  margin:10px 0;
}

.stat{
  background:#000;
  color:#d4af37;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<h1>Vault Admin</h1>

<input id="title" placeholder="Título">
<textarea id="content" placeholder="Conteúdo"></textarea>
<input type="file" id="image">
<input id="order" placeholder="Ordem">

<button onclick="createPage()">Criar Página</button>

<h3 id="msg"></h3>

<hr>

<div id="list"></div>

<hr>

<h2>QR Stats</h2>
<div id="stats"></div>

<hr>

<h2>Access Logs</h2>
<div id="logs"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data: userData } = await supabase.auth.getUser();

if(!userData.user){
  alert("Acesso negado. Faça login.");
  location.href="/";
}

/* LOAD PAGES */
async function load(){

const { data, error } = await supabase
.from("vault_pages")
.select("*")
.order("order_index");

if(error){
console.log(error);
return;
}

const list=document.getElementById("list");
list.innerHTML="";

data.forEach(p=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<strong>${p.title}</strong>
<button onclick="del('${p.id}')">Excluir</button>
`;

list.appendChild(div);
});

}

/* 🔥 STATS POR QR */
async function loadStats(){

const { data, error } = await supabase
.from("access_tokens")
.select("*")
.order("uses",{ascending:false});

if(error){
console.log(error);
return;
}

const stats=document.getElementById("stats");
stats.innerHTML="";

data.forEach(t=>{
const div=document.createElement("div");
div.className="stat";

div.innerHTML=`
<b>${t.token}</b><br>
Tipo: ${t.tipo}<br>
Usos: ${t.uses || 0} ${t.max_uses ? "/ "+t.max_uses : ""}
`;

stats.appendChild(div);
});

}

/* LOAD LOGS */
async function loadLogs(){

const { data, error } = await supabase
.from("access_logs")
.select("*")
.order("created_at",{ascending:false})
.limit(50);

if(error){
console.log(error);
return;
}

const logsDiv = document.getElementById("logs");
logsDiv.innerHTML = "";

data.forEach(l=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${l.token}</b><br>
${new Date(l.created_at).toLocaleString()}<br>
${l.user_agent}
`;

logsDiv.appendChild(div);
});

}

/* DELETE */
window.del = async function(id){

if(!confirm("Deseja realmente excluir?")) return;

await supabase
.from("vault_pages")
.delete()
.eq("id",id);

load();
}

/* UPLOAD */
async function upload(file){

if(!file) return null;

const user = (await supabase.auth.getUser()).data.user;

const name = user.id + "/" + Date.now() + "_" + file.name;

await supabase.storage
.from("vault-assets")
.upload(name,file);

const { data } = supabase.storage
.from("vault-assets")
.getPublicUrl(name);

return data.publicUrl;
}

/* CREATE */
window.createPage = async function(){

const msg = document.getElementById("msg");
msg.innerText="Salvando...";

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;
const order=parseInt(document.getElementById("order").value) || 0;

const file=document.getElementById("image").files[0];

const image_url = await upload(file);

const { error } = await supabase
.from("vault_pages")
.insert({
title,
content,
image_url,
order_index:order
});

if(error){
msg.innerText="ERRO: "+error.message;
return;
}

msg.innerText="Página criada";

load();
loadStats();
loadLogs();

}

/* INIT */
load();
loadStats();
loadLogs();

</script>

</body>
</html>
