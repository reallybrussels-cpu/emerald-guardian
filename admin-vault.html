<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

.page{
width:50%;
float:left;
padding:40px;
box-sizing:border-box;
}

img{
width:100%;
}

.nav{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px;
border:1px solid gold;
background:none;
color:gold;
cursor:pointer;
}
</style>
</head>

<body>

<div id="left" class="page"></div>
<div id="right" class="page"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data } = await supabase.auth.getUser();
if(!data.user){
alert("Faça login");
location.href="/";
}

/* BUSCAR DADOS */
const { data: pages } = await supabase
.from("vault_pages")
.select("*")
.order("order_index");

/* VALIDAÇÃO */
if(!pages || pages.length === 0){
document.body.innerHTML="<h2 style='color:white;padding:20px'>Nenhuma página criada ainda</h2>";
throw "sem dados";
}

/* ESTADO */
let index=0;

/* BUILD */
function build(p){

return `
<h2>${p.title || ""}</h2>
<p>${p.content || ""}</p>
${p.image_url ? `<img src="${p.image_url}">` : ""}
`;

}

/* RENDER */
function render(){

document.getElementById("left").innerHTML = build(pages[index]);
document.getElementById("right").innerHTML = build(pages[index+1] || {});

}

/* NAV */
window.next = ()=>{
if(index < pages.length-1){
index++;
render();
}
}

window.prev = ()=>{
if(index > 0){
index--;
render();
}
}

render();

</script>

</body>
</html>
