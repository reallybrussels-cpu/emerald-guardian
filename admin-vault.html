<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:30px;
  color:#222;
}

.container{
  max-width:900px;
  margin:auto;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:10px;
  margin-top:10px;
  background:#d4af37;
  border:none;
  cursor:pointer;
}

.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Vault Admin</h1>

<input id="title" placeholder="Título">
<textarea id="content" placeholder="Conteúdo"></textarea>
<input type="file" id="image">
<input id="order" placeholder="Ordem">

<button onclick="createPage()">Criar Página</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* PROTEÇÃO ADMIN */
const { data } = await supabase.auth.getUser();
if(!data.user) location.href="/";

const { data: user } = await supabase
.from("users_access")
.select("*")
.eq("email", data.user.email)
.single();

if(user.role !== "admin"){
  alert("Admin only");
  location.href="/";
}

/* LISTAR */
async function load(){
  const { data } = await supabase.from("vault_pages").select("*").order("order_index");

  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <strong>${p.title}</strong><br>
      <button onclick="del('${p.id}')">Excluir</button>
    `;

    list.appendChild(div);
  });
}

window.del = async function(id){
  if(!confirm("Excluir página?")) return;
  await supabase.from("vault_pages").delete().eq("id",id);
  load();
}

/* UPLOAD */
async function upload(file){
  if(!file) return null;

  const name = Date.now()+"_"+file.name;

  await supabase.storage.from("vault-assets").upload(name,file);

  const { data } = supabase.storage.from("vault-assets").getPublicUrl(name);

  return data.publicUrl;
}

/* CRIAR */
window.createPage = async function(){

  const title=document.getElementById("title").value;
  const content=document.getElementById("content").value;
  const order=parseInt(document.getElementById("order").value);

  const file=document.getElementById("image").files[0];
  const image_url = await upload(file);

  await supabase.from("vault_pages").insert({
    title,content,image_url,order_index:order
  });

  alert("Página criada");

  load();
}

load();

</script>

</body>
</html>
