<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault Admin</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
.menu{background:#000;color:#d4af37;display:flex;padding:15px 30px;gap:30px;align-items:center;}
.menu h1{margin:0;font-size:20px;margin-right:40px;}
.menu button{background:none;border:none;color:#d4af37;cursor:pointer;}
.section{display:none;padding:30px;}
.section.active{display:block;}
input, textarea{width:100%;padding:10px;margin:5px 0;}
button.action{padding:10px;background:gold;border:none;cursor:pointer;}
.card{background:#fff;padding:10px;margin:10px 0;}
.stat{background:#000;color:#d4af37;padding:10px;margin:10px 0;}
.btnSmall{padding:5px 10px;margin:5px;border:none;cursor:pointer;}
.btnOn{background:green;color:#fff;}
.btnOff{background:red;color:#fff;}
</style>
</head>

<body>

<div class="menu">
  <h1>Vault Admin</h1>
  <button data-section="flip">Flipbook</button>
  <button data-section="stats">QR Stats</button>
  <button data-section="logs">Access Logs</button>
  <button data-section="qr">Gerador de QR</button>
</div>

<!-- SEÇÕES -->
<div id="flip" class="section active">
  <h2>Flipbook</h2>
</div>

<div id="stats" class="section">
  <h2>QR Stats</h2>
</div>

<div id="logs" class="section">
  <h2>Access Logs</h2>
</div>

<div id="qr" class="section">
  <h2>Gerador de QR</h2>

  <input id="qrNome" placeholder="Nome">
  <input id="qrMax" placeholder="Limite de acessos">
  <input id="qrExpire" placeholder="YYYY-MM-DD">

  <button class="action" onclick="gerarQR()">Gerar QR</button>

  <div id="qrImagem"></div>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

// ======================
// GERAR QR
// ======================
window.gerarQR = async function(){

  const nome = document.getElementById("qrNome").value || "VIP";
  const max = parseInt(document.getElementById("qrMax").value) || null;
  const expire = document.getElementById("qrExpire").value || null;

  const random = Math.floor(Math.random()*10000);
  const token = `VIP-${nome.toUpperCase().replace(/\s/g,'')}-${random}`;

  const { error } = await supabase.from("access_tokens").insert({
    token,nome,tipo:"vip",max_uses:max,expires_at: expire,ativo:true,uses:0
  });

  if(error){
    alert("Erro ao criar QR");
    return;
  }

  const link = `https://www.projectemeraldvault.com/?access=${token}`;

  document.getElementById("qrImagem").innerHTML = `
    <p><strong>${token}</strong></p>

    <button class="action" data-qr="2000" data-link="${link}" data-token="${token}">
      Premium 2000px
    </button>

    <button class="action" data-qr="4000" data-link="${link}" data-token="${token}">
      Premium 4000px
    </button>

    <button class="action" data-auto="1" data-link="${link}" data-token="${token}">
      Gerar + Baixar Automático
    </button>
  `;
}

// ======================
// DOWNLOAD SIMPLES (QR LIMPO)
// ======================
function gerarImagemQR(link, size){
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(link)}`;
}

function baixarQRPremium(link, token, tamanho){
  const url = gerarImagemQR(link, tamanho);

  const novaAba = window.open();
  novaAba.document.write(`
    <title>${token}</title>
    <img src="${url}" style="width:100%;max-width:800px;display:block;margin:auto;" />
  `);
}

function baixarAutomatico(link, token){
  baixarQRPremium(link, token, 2000);
  setTimeout(()=>baixarQRPremium(link, token, 4000),800);
}

// ======================
// MENU
// ======================
window.showSection = function(id){

  const sections = document.querySelectorAll(".section");

  sections.forEach(sec=>{
    sec.classList.remove("active");
  });

  const el = document.getElementById(id);
  if(el){
    el.classList.add("active");
  }

}

// ======================
// EVENTOS
// ======================
document.addEventListener("DOMContentLoaded", () => {

  // MENU
  document.querySelectorAll(".menu button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      showSection(btn.dataset.section);
    });
  });

});

// BOTÕES DINÂMICOS
document.addEventListener("click", (e)=>{
  const btn = e.target.closest("button");
  if(!btn) return;

  if(btn.dataset.qr){
    baixarQRPremium(
      btn.dataset.link,
      btn.dataset.token,
      parseInt(btn.dataset.qr)
    );
  }

  if(btn.dataset.auto){
    baixarAutomatico(
      btn.dataset.link,
      btn.dataset.token
    );
  }
});

</script>

</body>
</html>
