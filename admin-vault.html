<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emerald Vault</title>

<style>
body{
margin:0;
background:#000;
font-family:serif;
overflow:hidden;
}

.book{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
perspective:2000px;
}

.page{
width:50%;
height:80%;
position:absolute;
top:10%;
background:#111;
color:#fff;
padding:40px;
transform-origin:left;
transition:transform 1s;
backface-visibility:hidden;
overflow:auto;
}

.page.right{ left:50%; }
.page.left{ left:0; transform-origin:right; }

.page.flipped{ transform:rotateY(-180deg); }

img{
width:100%;
transition:0.5s;
}

.nav{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:none;
color:#d4af37;
cursor:pointer;
}
</style>
</head>

<body>

<div class="book" id="book"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* LOGIN */
const { data } = await supabase.auth.getUser();
if(!data.user) location.href="/";

/* USER */
const { data: user } = await supabase
.from("users_access")
.select("*")
.eq("email", data.user.email)
.single();

if(!user || user.status !== "aprovado"){
alert("Access denied");
location.href="/";
}

/* EXPIRAÇÃO */
if(user.expires_at && new Date(user.expires_at) < new Date()){
alert("Access expired");
location.href="/";
}

/* LOG */
await supabase.from("vault_logs").insert({
email:data.user.email,
action:"enter_vault"
});

/* DADOS */
let pages=[];
let current=0;

async function load(){

const { data } = await supabase
.from("vault_pages")
.select("*")
.order("order_index");

pages=data || [];

render();
}

/* BUILD SEGURO */
function build(p){

if(!p) return "";

let html = `<h2>${p.title || ""}</h2>`;

/* NOVO FORMATO (blocks) */
if(p.blocks && Array.isArray(p.blocks)){

p.blocks.forEach(b=>{
if(!b) return;

if(b.type==="text") html+=`<p>${b.content || ""}</p>`;
if(b.type==="image" && b.url) html+=`<img src="${b.url}">`;
if(b.type==="video" && b.url){
html+=`
<video width="100%" controls>
<source src="${b.url}">
</video>`;
}
});

}

/* FORMATO ANTIGO (fallback) */
else{

if(p.content) html+=`<p>${p.content}</p>`;
if(p.image_url) html+=`<img src="${p.image_url}">`;
if(p.video_url){
html+=`
<video width="100%" controls>
<source src="${p.video_url}">
</video>`;
}

}

return html;
}

/* RENDER */
function render(){

const book=document.getElementById("book");
book.innerHTML="";

pages.forEach((p,i)=>{

const div=document.createElement("div");
div.className="page " + (i%2===0?"left":"right");

if(i<current) div.classList.add("flipped");

div.innerHTML=build(p);

book.appendChild(div);
});

}

/* NAV */
window.next = function(){
if(current < pages.length){
current++;
render();
}
}

window.prev = function(){
if(current > 0){
current--;
render();
}
}

/* TRACKING */
let start=Date.now();

async function track(){
await supabase.from("vault_tracking").insert({
email:data.user.email,
page_index:current,
time_spent:Math.floor((Date.now()-start)/1000)
});
}

setInterval(track,5000);

/* PROTEÇÃO */
document.addEventListener("contextmenu",e=>e.preventDefault());

/* INIT */
load();

</script>

</body>
</html>
