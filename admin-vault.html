<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault CMS Elite</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
}

h1{margin-bottom:20px;}

.editor{
  background:#fff;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
}

.block{
  border:1px dashed #ccc;
  padding:10px;
  margin:10px 0;
  background:#fafafa;
}

.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:6px;
  cursor:grab;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.save{background:#27ae60;color:#fff;}
.delete{background:#e74c3c;color:#fff;}
.edit{background:#3498db;color:#fff;}

img{
  max-width:100%;
  cursor:zoom-in;
}

.dashboard{
  background:#fff;
  padding:20px;
  margin-top:20px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Vault CMS Elite</h1>

<div class="editor">

<h3>Editor de Página</h3>

<input id="title" placeholder="Título">
<input id="order" placeholder="Ordem">

<div id="blocks"></div>

<button onclick="addText()">+ Texto</button>
<button onclick="addImage()">+ Imagem</button>
<button onclick="addVideo()">+ Vídeo</button>

<br><br>

<button class="save" onclick="save()">Salvar Página</button>

</div>

<h3>Páginas (Arraste para ordenar)</h3>
<div id="list"></div>

<div class="dashboard">
<h3>Analytics</h3>
<div id="stats"></div>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* 🔐 ADMIN */
const { data } = await supabase.auth.getUser();
if(!data.user) location.href="/";

const { data: user } = await supabase
.from("users_access")
.select("*")
.eq("email", data.user.email)
.single();

if(user.role !== "admin"){
alert("Admin only");
location.href="/";
}

/* BLOCO */
let blocks = [];

window.addText = function(){
blocks.push({type:"text",content:""});
renderBlocks();
}

window.addImage = function(){
blocks.push({type:"image"});
renderBlocks();
}

window.addVideo = function(){
blocks.push({type:"video"});
renderBlocks();
}

function renderBlocks(){
const container = document.getElementById("blocks");
container.innerHTML="";

blocks.forEach((b,i)=>{
const div=document.createElement("div");
div.className="block";

if(b.type==="text"){
div.innerHTML=`<textarea onchange="updateText(${i},this.value)">${b.content||""}</textarea>`;
}

if(b.type==="image"){
div.innerHTML=`<input type="file" onchange="uploadImage(${i},this)">`;
}

if(b.type==="video"){
div.innerHTML=`<input type="file" onchange="uploadVideo(${i},this)">`;
}

container.appendChild(div);
});
}

window.updateText = (i,val)=> blocks[i].content = val;

/* UPLOAD */
async function upload(file){
const name = Date.now()+"_"+file.name;

await supabase.storage.from("vault-assets").upload(name,file);

const { data } = supabase.storage.from("vault-assets").getPublicUrl(name);
return data.publicUrl;
}

window.uploadImage = async (i,input)=>{
const url = await upload(input.files[0]);
blocks[i].url = url;
}

window.uploadVideo = async (i,input)=>{
const url = await upload(input.files[0]);
blocks[i].url = url;
}

/* SALVAR */
window.save = async function(){

const title = document.getElementById("title").value;
const order = parseInt(document.getElementById("order").value);

await supabase.from("vault_pages").insert({
title,
order_index:order,
blocks
});

alert("Salvo");
load();
}

/* LISTA + DRAG */
let dragged;

function load(){

supabase.from("vault_pages").select("*").order("order_index")
.then(res=>{

const list=document.getElementById("list");
list.innerHTML="";

res.data.forEach(p=>{

const div=document.createElement("div");
div.className="card";
div.draggable=true;

div.innerHTML=`${p.title}`;

div.ondragstart=()=>dragged=p;
div.ondragover=e=>e.preventDefault();

div.ondrop=async ()=>{

await supabase.from("vault_pages")
.update({order_index:dragged.order_index})
.eq("id",p.id);

await supabase.from("vault_pages")
.update({order_index:p.order_index})
.eq("id",dragged.id);

load();
};

list.appendChild(div);

});

});
}

/* ANALYTICS */
async function analytics(){

const { data } = await supabase.from("vault_tracking").select("*");

let total = data.length;
let time = data.reduce((a,b)=>a+b.time_spent,0);

document.getElementById("stats").innerHTML = `
Total visitas: ${total}<br>
Tempo total: ${time}s
`;
}

setInterval(analytics,5000);

/* ALERTA */
let lastCheck = 0;

async function checkAccess(){

const { data } = await supabase
.from("vault_logs")
.select("*")
.order("created_at",{ascending:false})
.limit(1);

if(data[0] && data[0].created_at !== lastCheck){

lastCheck = data[0].created_at;

alert("Usuário entrou no Vault");
}
}

setInterval(checkAccess,7000);

load();
analytics();

</script>

</body>
</html>
