<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault CMS</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:30px;
  color:#222;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{margin-bottom:10px;}
h2{margin-top:30px;}

input, textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
  background:#fff;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.save{background:#27ae60;color:#fff;}
.delete{background:#e74c3c;color:#fff;}
.edit{background:#3498db;color:#fff;}

.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:6px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.preview img{
  max-width:100%;
  margin-top:10px;
}

.preview video{
  max-width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Vault CMS</h1>

<h2>Editor</h2>

<input id="title" placeholder="Título">
<textarea id="content" placeholder="Conteúdo"></textarea>

<input type="file" id="image">
<input type="file" id="video">
<input type="file" id="pdf">

<input id="order" placeholder="Ordem">

<button class="save" onclick="savePage()">Salvar Página</button>

<div class="preview" id="preview"></div>

<hr>

<h2>Páginas</h2>
<div id="list"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* 🔐 PROTEÇÃO ADMIN */
const { data } = await supabase.auth.getUser();

if(!data.user) location.href="/";

const { data: user } = await supabase
.from("users_access")
.select("*")
.eq("email", data.user.email)
.single();

if(user.role !== "admin"){
  alert("Admin only");
  location.href="/";
}

/* ESTADO */
let editingId = null;

/* LISTAR */
async function load(){

  const { data } = await supabase
    .from("vault_pages")
    .select("*")
    .order("order_index");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <strong>${p.title}</strong><br>
      Ordem: ${p.order_index}<br>

      <button class="edit" onclick="edit('${p.id}')">Editar</button>
      <button class="delete" onclick="del('${p.id}')">Excluir</button>
    `;

    list.appendChild(div);
  });
}

/* EDITAR */
window.edit = async function(id){

  const { data } = await supabase
    .from("vault_pages")
    .select("*")
    .eq("id",id)
    .single();

  editingId = id;

  document.getElementById("title").value = data.title;
  document.getElementById("content").value = data.content;
  document.getElementById("order").value = data.order_index;
}

/* EXCLUIR */
window.del = async function(id){

  if(!confirm("Excluir página?")) return;

  await supabase.from("vault_pages").delete().eq("id",id);

  load();
}

/* UPLOAD */
async function upload(file){

  if(!file) return null;

  const name = Date.now()+"_"+file.name;

  await supabase.storage
    .from("vault-assets")
    .upload(name,file);

  const { data } = supabase
    .storage
    .from("vault-assets")
    .getPublicUrl(name);

  return data.publicUrl;
}

/* SALVAR */
window.savePage = async function(){

  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const order = parseInt(document.getElementById("order").value);

  const imageFile = document.getElementById("image").files[0];
  const videoFile = document.getElementById("video").files[0];
  const pdfFile = document.getElementById("pdf").files[0];

  const image_url = await upload(imageFile);
  const video_url = await upload(videoFile);
  const pdf_url = await upload(pdfFile);

  if(editingId){

    await supabase.from("vault_pages").update({
      title,
      content,
      image_url,
      video_url,
      pdf_url,
      order_index: order
    }).eq("id", editingId);

    editingId = null;

  }else{

    await supabase.from("vault_pages").insert({
      title,
      content,
      image_url,
      video_url,
      pdf_url,
      order_index: order
    });

  }

  alert("Salvo com sucesso");

  load();
}

/* PREVIEW */
document.getElementById("image").addEventListener("change", e=>{
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  document.getElementById("preview").innerHTML = `<img src="${url}">`;
});

/* INIT */
load();

</script>

</body>
</html>
