<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald CRM</title>

<meta name="robots" content="noindex">

<style>
body{margin:0;font-family:Arial;font-size:12px;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;background:#000;color:#fff;flex-direction:column;}
#login input{margin:5px;padding:10px;border:none;outline:none;width:200px;}
#login button{padding:10px 20px;background:#b8962e;border:none;color:#000;cursor:pointer;}
#app{display:none;padding:20px;background:#fff;color:#000;}
h1{color:#b8962e;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.actions{display:flex;gap:8px;align-items:center;}
button, select, input{padding:5px 10px;border:1px solid #b8962e;background:#fff;color:#b8962e;font-size:12px;}
.dashboard{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.card{border:1px solid #ddd;padding:10px;min-width:120px;background:#fafafa;}
.table{width:100%;border-collapse:collapse;text-align:center;}
.table th,.table td{padding:8px;border-bottom:1px solid #ddd;}
.table th{background:#f5f5f5;}
.star{color:#b8962e;}
</style>
</head>

<body>

<div id="login">
<h2>Emerald Secure Access</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app">

<div class="topbar">
<h1>Emerald CRM</h1>

<div class="actions">
<input id="search" placeholder="Buscar..." oninput="render()">

<select id="filterStatus" onchange="render()">
<option value="todos">Todos</option>
<option value="novo">Novo</option>
<option value="frio">Frio</option>
<option value="morno">Morno</option>
<option value="quente">Quente</option>
<option value="cliente">Cliente</option>
</select>

<select id="filterCountry" onchange="render()">
<option value="todos">País</option>
</select>

<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="card">Total<br><strong id="total">0</strong></div>
<div class="card">Novos<br><strong id="novos">0</strong></div>
<div class="card">Clientes<br><strong id="clientes">0</strong></div>
<div class="card">Quentes<br><strong id="quentes">0</strong></div>
<div class="card">Mornos<br><strong id="mornos">0</strong></div>
<div class="card">Frios<br><strong id="frios">0</strong></div>
</div>

<h1>Lista de Leads</h1>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Status</th>
<th>Score</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){ alert(error.message); return; }

  showApp();
}

window.logout = async function(){
  await supabase.auth.signOut();
  location.reload();
}

async function checkSession(){
  const { data } = await supabase.auth.getSession();
  if(data.session) showApp();
}
checkSession();

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

let leads=[];

async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*',{
    headers:{ 'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL' }
  });

  leads = await res.json();
  leads.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

  loadCountries();
  render();
}

function loadCountries(){
  const select = document.getElementById("filterCountry");
  const countries = [...new Set(leads.map(l=>l.ddi))];

  select.innerHTML = '<option value="todos">País</option>';

  countries.forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c;
    opt.textContent=formatCountry(c);
    select.appendChild(opt);
  });
}

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  leads.forEach(l=>{
    const status=l.status||"novo";

    const tr=document.createElement("tr");

    tr.innerHTML=`
<td>${l.name}</td>
<td>${l.email}</td>
<td>${l.phone}</td>
<td>${formatCountry(l.ddi)}</td>
<td>
<select onchange="updateStatus(${l.id}, this.value)">
<option value="novo" ${status==="novo"?"selected":""}>Novo</option>
<option value="frio" ${status==="frio"?"selected":""}>Frio</option>
<option value="morno" ${status==="morno"?"selected":""}>Morno</option>
<option value="quente" ${status==="quente"?"selected":""}>Quente</option>
<option value="cliente" ${status==="cliente"?"selected":""}>Cliente</option>
</select>
</td>
<td>${status}</td>
<td><button onclick="del(${l.id})">Excluir</button></td>
`;

    tbody.appendChild(tr);
  });
}

window.del = async function(id){
  if(!confirm("Excluir lead?")) return;

  await fetch(
    `https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`,
    {
      method: "DELETE",
      headers: {
        "apikey": "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL",
        "Authorization": "Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
      }
    }
  );

  load();
}

async function updateStatus(id,status){
  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`,{
    method:"PATCH",
    headers:{
      'Content-Type':'application/json',
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    },
    body:JSON.stringify({status})
  });

  load();
}

window.exportCSV = function(){
  let csv = "Nome,Email,Telefone,Pais,Status\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${formatCountry(l.ddi)}","${l.status || "novo"}"\n`;
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}
