<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Executive</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
padding:40px;
}

h1{
color:#d4af37;
font-weight:500;
letter-spacing:1px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

button{
padding:8px 18px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
}

button:hover{
background:#d4af37;
color:#000;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
border:1px solid rgba(212,175,55,0.3);
padding:25px;
min-width:200px;
background:rgba(255,255,255,0.02);
}

.card h2{
margin:0;
font-size:32px;
color:#00ff88;
}

.section{
margin-top:40px;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th, .table td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.table th{
color:#00ff88;
font-weight:400;
}

.rank{
color:#d4af37;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Emerald Executive</h1>
<div>
<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="card">
<div>Total Leads</div>
<h2 id="total">0</h2>
</div>

<div class="card">
<div>Hoje</div>
<h2 id="today">0</h2>
</div>
</div>

<div class="section">
<h1>Leads por Dia</h1>
<canvas id="chart"></canvas>
</div>

<div class="section">
<h1>Ranking de Interação</h1>
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Total Interações</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<script>

let leads = [];

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  leads = await res.json();

  buildStats();
  buildChart();
  buildRanking();
}

// STATS
function buildStats(){
  const total = leads.length;

  const todayDate = new Date().toDateString();
  let today = 0;

  leads.forEach(l=>{
    if(new Date(l.created_at).toDateString() === todayDate){
      today++;
    }
  });

  document.getElementById("total").innerText = total;
  document.getElementById("today").innerText = today;
}

// CHART
function buildChart(){
  const map = {};

  leads.forEach(l=>{
    const d = new Date(l.created_at).toLocaleDateString();
    map[d] = (map[d] || 0) + 1;
  });

  const labels = Object.keys(map);
  const values = Object.values(map);

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Leads",
        data:values,
        borderWidth:2
      }]
    }
  });
}

// RANKING
function buildRanking(){
  const count = {};

  leads.forEach(l=>{
    count[l.name] = (count[l.name] || 0) + 1;
  });

  const sorted = Object.entries(count)
    .sort((a,b)=>b[1]-a[1]);

  const tbody = document.getElementById("ranking");
  tbody.innerHTML = "";

  sorted.forEach((item,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td>${item[0]}</td>
      <td>${item[1]}</td>
    `;

    tbody.appendChild(tr);
  });
}

// EXPORT
function exportCSV(){
  let csv = "Nome,Email,Telefone,Data\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

load();

</script>

</body>
</html>
