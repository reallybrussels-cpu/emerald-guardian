<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald CRM</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{
color:#d4af37;
margin-bottom:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:8px 16px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
margin-left:5px;
}

button:hover{
background:#d4af37;
color:#000;
}

select{
background:#000;
color:#fff;
border:1px solid #00ff88;
padding:5px;
}

.card{
border:1px solid #00ff88;
padding:15px;
display:inline-block;
margin-bottom:20px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:12px;
border-bottom:1px solid rgba(0,255,136,0.4);
}

.table th{
color:#00ff88;
border-bottom:2px solid #00ff88;
}

.table tr{
border-bottom:1px solid rgba(0,255,136,0.3);
}

.hot{background:rgba(0,255,136,0.15);}
.warm{background:rgba(255,200,0,0.15);}
.cold{background:rgba(255,255,255,0.08);}
</style>
</head>

<body>

<div class="topbar">
<h1>Emerald CRM</h1>
<div>
<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="card">
Total: <span id="total">0</span>
</div>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let leads = [];

// LOGOUT
function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

// LOAD
async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  leads = await res.json();
  render();
}

function getClass(status){
  if(status === "hot") return "hot";
  if(status === "warm") return "warm";
  return "cold";
}

// RENDER
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  leads.forEach(l=>{
    const tr = document.createElement("tr");
    tr.className = getClass(l.status);

    tr.innerHTML = `
      <td>${l.name}</td>
      <td>${l.email}</td>
      <td>${l.phone}</td>

      <td>
        <select id="status-${l.id}">
          <option value="cold" ${l.status==="cold"?"selected":""}>Frio</option>
          <option value="warm" ${l.status==="warm"?"selected":""}>Morno</option>
          <option value="hot" ${l.status==="hot"?"selected":""}>Quente</option>
        </select>
      </td>

      <td>
        <button onclick="save(${l.id})">Salvar</button>
        <button onclick="del(${l.id})">Excluir</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("total").innerText = leads.length;
}

// SALVAR STATUS
async function save(id){
  const status = document.getElementById(`status-${id}`).value;

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      'Content-Type':'application/json',
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    },
    body:JSON.stringify({status})
  });

  load();
}

// DELETE
async function del(id){
  if(!confirm("Excluir lead?")) return;

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"DELETE",
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  load();
}

// EXPORT
function exportCSV(){
  let csv = "Nome,Email,Telefone,Status,Data\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.status}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

load();

</script>

</body>
</html>
