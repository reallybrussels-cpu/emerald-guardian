<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{color:#d4af37;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
padding:8px 16px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
margin:3px;
}

button:hover{
background:#d4af37;
color:#000;
}

input{
padding:10px;
margin:5px;
background:#000;
border:1px solid rgba(0,255,136,0.3);
color:#fff;
}

.hidden{display:none;}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
border:1px solid rgba(0,255,136,0.1);
padding:20px;
min-width:150px;
}

.card h2{
color:#00ff88;
margin:0;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:10px;
border-bottom:1px solid rgba(0,255,136,0.2);
}

.table th{color:#00ff88;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h1>Admin Login</h1>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="panel" class="hidden">

<div class="topbar">
<h1>Emerald Dashboard</h1>
<div>
<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="card">
<div>Total</div>
<h2 id="total">0</h2>
</div>

<div class="card">
<div>Hoje</div>
<h2 id="today">0</h2>
</div>
</div>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

// 👤 USUÁRIOS
const USERS = {
  "Fernando":"EmeraldFernando2026",
  "Almir":"AlmirEsmeralda2025",
  "Renato":"RPDiamonds2027"
};

let leads = [];

// LOGIN
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(USERS[u] && USERS[u] === p){
    localStorage.setItem("auth","true");
    showPanel();
  }else{
    alert("Acesso negado");
  }
}

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

if(localStorage.getItem("auth") === "true"){
  showPanel();
}

function showPanel(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadLeads();
}

// LOAD
async function loadLeads(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  leads = await res.json();
  render();
}

// RENDER
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let today = 0;
  const now = new Date().toDateString();

  leads.forEach(l=>{
    if(new Date(l.created_at).toDateString() === now) today++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td contenteditable="true">${l.name}</td>
      <td contenteditable="true">${l.email}</td>
      <td contenteditable="true">${l.phone}</td>
      <td>${l.ddi}</td>
      <td>${new Date(l.created_at).toLocaleString()}</td>
      <td>
        <button onclick="save(${l.id}, this)">Salvar</button>
        <button onclick="del(${l.id})">Excluir</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("total").innerText = leads.length;
  document.getElementById("today").innerText = today;
}

// SALVAR
async function save(id, btn){
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      'Content-Type':'application/json',
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    },
    body:JSON.stringify({
      name: tds[0].innerText,
      email: tds[1].innerText,
      phone: tds[2].innerText
    })
  });

  alert("Atualizado");
}

// DELETE
async function del(id){
  if(!confirm("Excluir lead?")) return;

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"DELETE",
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  loadLeads();
}

// EXPORT
function exportCSV(){
  let csv = "Nome,Email,Telefone,Pais,Data\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.ddi}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

</script>

</body>
</html>
