<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{
color:#d4af37;
margin-bottom:20px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:12px;
border-bottom:1px solid rgba(0,255,136,0.2);
text-align:left;
}

.table th{
color:#00ff88;
font-weight:500;
}

.table tr:hover{
background:#001a10;
}

.card{
border:1px solid rgba(0,255,136,0.1);
padding:20px;
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>Emerald Guardian - Leads</h1>

<div class="card">
<table class="table" id="leadsTable">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

async function loadLeads(){
  try{
    const response = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
      headers:{
        'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
        'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
      }
    });

    const data = await response.json();

    const tbody = document.querySelector("#leadsTable tbody");
    tbody.innerHTML = "";

    data.reverse().forEach(lead=>{
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${lead.name}</td>
        <td>${lead.email}</td>
        <td>${lead.phone}</td>
        <td>${lead.ddi}</td>
        <td>${new Date(lead.created_at).toLocaleString()}</td>
      `;

      tbody.appendChild(tr);
    });

  }catch(err){
    console.error(err);
    alert("Erro ao carregar leads");
  }
}

loadLeads();

</script>

</body>
</html>
