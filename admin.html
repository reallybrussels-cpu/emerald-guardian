<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald CRM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#fff;
color:#222;
font-family:Arial;
padding:20px;
font-size:12px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
flex-wrap:wrap;
}

h1{
color:#b8962e;
font-size:18px;
}

button, select{
padding:5px 10px;
border:1px solid #b8962e;
background:#fff;
color:#b8962e;
cursor:pointer;
font-size:12px;
margin-left:5px;
}

button:hover{
background:#b8962e;
color:#fff;
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:15px;
}

.card{
border:1px solid #ddd;
padding:8px;
min-width:100px;
}

.grid{
display:grid;
grid-template-columns: 2fr 1fr;
gap:20px;
margin-top:20px;
}

canvas{
max-height:200px;
}

/* tabela */
.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th, .table td{
padding:6px;
border-bottom:1px solid #ddd;
}

.table th{
background:#f5f5f5;
}

.top{
background:#fff8e1;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Emerald CRM</h1>

<div>
<select id="filterDate" onchange="load()">
<option value="all">Todos</option>
<option value="today">Hoje</option>
<option value="7">7 dias</option>
</select>

<select id="filterCountry" onchange="applyFilters()">
<option value="">País</option>
<option value="Brazil (+55)">Brazil</option>
<option value="USA (+1)">USA</option>
<option value="UK (+44)">UK</option>
</select>

<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="card">Total: <strong id="total">0</strong></div>
<div class="card">Hoje: <strong id="today">0</strong></div>
</div>

<div class="grid">

<div>
<h1>Leads</h1>
<canvas id="chart"></canvas>
</div>

<div>
<h1>Top Leads</h1>
<table class="table">
<thead>
<tr><th>#</th><th>Nome</th><th>Total</th></tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

</div>

<!-- TABELA COMPLETA -->
<h1 style="margin-top:25px;">Lista de Leads</h1>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let leads = [];
let filtered = [];

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  let data = await res.json();

  const filter = document.getElementById("filterDate").value;
  const now = new Date();

  if(filter === "today"){
    data = data.filter(l=> new Date(l.created_at).toDateString() === now.toDateString());
  }

  if(filter === "7"){
    data = data.filter(l=>{
      const diff = (now - new Date(l.created_at)) / (1000*60*60*24);
      return diff <= 7;
    });
  }

  leads = data;
  filtered = data;

  stats();
  chart();
  ranking();
  renderTable();
}

// FILTRO POR PAÍS
function applyFilters(){
  const country = document.getElementById("filterCountry").value;

  filtered = leads.filter(l=>{
    return !country || l.ddi === country;
  });

  renderTable();
}

// TABELA
function renderTable(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(l=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${l.name}</td>
      <td>${l.email}</td>
      <td>${l.phone}</td>
      <td>${l.ddi}</td>
      <td>${new Date(l.created_at).toLocaleString()}</td>
    `;

    tbody.appendChild(tr);
  });
}

// STATS
function stats(){
  document.getElementById("total").innerText = leads.length;

  const today = new Date().toDateString();
  let count = 0;

  leads.forEach(l=>{
    if(new Date(l.created_at).toDateString() === today) count++;
  });

  document.getElementById("today").innerText = count;
}

// CHART
function chart(){
  const map = {};

  leads.forEach(l=>{
    const d = new Date(l.created_at).toLocaleDateString();
    map[d] = (map[d] || 0) + 1;
  });

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:Object.keys(map),
      datasets:[{ data:Object.values(map) }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:10}}},
        y:{ticks:{font:{size:10}}}
      }
    }
  });
}

// RANKING
function ranking(){
  const count = {};

  leads.forEach(l=>{
    count[l.name] = (count[l.name] || 0) + 1;
  });

  const sorted = Object.entries(count).sort((a,b)=>b[1]-a[1]);

  const tbody = document.getElementById("ranking");
  tbody.innerHTML = "";

  sorted.forEach((r,i)=>{
    const tr = document.createElement("tr");

    if(i===0) tr.classList.add("top");

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
    `;

    tbody.appendChild(tr);
  });
}

// EXPORT
function exportCSV(){
  let csv = "Nome,Email,Telefone,Pais,Data\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.ddi}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

load();

</script>

</body>
</html>
