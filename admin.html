<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald CRM</title>

<meta name="robots" content="noindex">

<style>
body{
margin:0;
font-family:Arial;
font-size:12px;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
flex-direction:column;
}

#login input{
margin:5px;
padding:8px;
border:none;
outline:none;
}

#login button{
padding:8px 20px;
background:#b8962e;
border:none;
color:#000;
cursor:pointer;
}

/* CRM */
#app{
display:none;
padding:20px;
background:#fff;
color:#000;
}

h1{color:#b8962e;}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

button{
padding:5px 10px;
border:1px solid #b8962e;
background:#fff;
color:#b8962e;
cursor:pointer;
}

/* STATUS */
.frio{background:#f5f5f5;}
.morno{background:#fff3cd;}
.quente{background:#d4edda;}
.cliente{background:#c3f7d4;}

.table{
width:100%;
border-collapse:collapse;
}

.table th,.table td{
padding:6px;
border-bottom:1px solid #ddd;
}

.table th{background:#f5f5f5;}
.star{color:#b8962e;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Emerald Access</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- CRM -->
<div id="app">

<div class="topbar">
<h1>Emerald CRM</h1>
<div>
<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div>Total: <strong id="total">0</strong></div>
<div>Hoje: <strong id="today">--</strong></div>
<div>Clientes: <strong id="clientes">0</strong></div>
<div>Quentes: <strong id="quentes">0</strong></div>
<div>Mornos: <strong id="mornos">0</strong></div>
<div>Frios: <strong id="frios">0</strong></div>
</div>

<h1>Leads</h1>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Status</th>
<th>Score</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

// LOGIN FIXO (SEUS USUÁRIOS)
const users = {
  "Fernando":"EmeraldFernando2026",
  "Almir":"AlmirEsmeralda2025",
  "Renato":"RPDiamonds2027"
};

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(users[u] === p){
    localStorage.setItem("auth", "ok");
    showApp();
  } else {
    alert("Acesso negado");
  }
}

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  load();
}

// AUTO LOGIN
if(localStorage.getItem("auth") === "ok"){
  showApp();
}

// ================= CRM =================

let leads = [];
let lastCount = 0;

async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  const data = await res.json();

  if(lastCount && data.length > lastCount){
    alert("🚀 Novo lead recebido");
  }

  lastCount = data.length;
  leads = data;

  render();
}

function stats(){
  document.getElementById("total").innerText = leads.length;

  const hoje = new Date();
  const hojeStr = hoje.toDateString();
  const ontem = new Date();
  ontem.setDate(ontem.getDate()-1);

  let hojeCount = 0;
  let ontemCount = 0;

  leads.forEach(l=>{
    const d = new Date(l.created_at).toDateString();
    if(d === hojeStr) hojeCount++;
    if(d === ontem.toDateString()) ontemCount++;
  });

  const formatada = hoje.toLocaleDateString("pt-BR");

  let crescimento = 0;
  if(ontemCount > 0){
    crescimento = ((hojeCount - ontemCount) / ontemCount * 100).toFixed(0);
  }

  document.getElementById("today").innerText =
    `${formatada} (${hojeCount}) ↑ ${crescimento}%`;
}

function getScore(status){
  if(status==="cliente") return "⭐⭐⭐⭐";
  if(status==="quente") return "⭐⭐⭐";
  if(status==="morno") return "⭐⭐";
  return "⭐";
}

function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  let clientes=0,quentes=0,mornos=0,frios=0;

  leads.forEach(l=>{
    const status = l.status || "frio";

    if(status==="cliente") clientes++;
    else if(status==="quente") quentes++;
    else if(status==="morno") mornos++;
    else frios++;

    const tr=document.createElement("tr");
    tr.className=status;

    tr.innerHTML=`
      <td>${l.name}</td>
      <td>${l.email}</td>
      <td>${l.phone}</td>
      <td>${l.ddi}</td>

      <td>
        <select onchange="updateStatus(${l.id}, this.value)">
          <option value="frio" ${status==="frio"?"selected":""}>Frio</option>
          <option value="morno" ${status==="morno"?"selected":""}>Morno</option>
          <option value="quente" ${status==="quente"?"selected":""}>Quente</option>
          <option value="cliente" ${status==="cliente"?"selected":""}>Cliente</option>
        </select>
      </td>

      <td class="star">${getScore(status)}</td>

      <td>
        <button onclick="del(${l.id})">Excluir</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("clientes").innerText=clientes;
  document.getElementById("quentes").innerText=quentes;
  document.getElementById("mornos").innerText=mornos;
  document.getElementById("frios").innerText=frios;

  stats();
}

async function updateStatus(id,status){
  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      'Content-Type':'application/json',
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    },
    body:JSON.stringify({status})
  });

  load();
}

async function del(id){
  if(!confirm("Excluir lead?")) return;

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"DELETE",
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  load();
}

function exportCSV(){
  let csv="Nome,Email,Telefone,Pais,Status\n";

  leads.forEach(l=>{
    csv+=`"${l.name}","${l.email}","${l.phone}","${l.ddi}","${l.status || "frio"}"\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="leads.csv";
  a.click();
}

setInterval(load, 10000);

</script>

</body>
</html>
