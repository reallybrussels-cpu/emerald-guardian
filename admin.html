<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{color:#d4af37;}

button{
padding:6px 12px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
margin:3px;
}

button:hover{
background:#d4af37;
color:#000;
}

select{
background:#000;
color:#fff;
border:1px solid rgba(0,255,136,0.3);
}

.table{
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:10px;
border-bottom:1px solid rgba(0,255,136,0.2);
}

.table th{color:#00ff88;}

.hot{background:rgba(0,255,136,0.1);}
.warm{background:rgba(255,200,0,0.1);}
.cold{background:rgba(255,255,255,0.05);}

.card{
border:1px solid rgba(0,255,136,0.1);
padding:20px;
margin-bottom:20px;
display:inline-block;
min-width:120px;
}

</style>
</head>

<body>

<h1>Emerald CRM</h1>

<div class="card">Total: <span id="total">0</span></div>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

let leads = [];

// LOAD
async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  leads = await res.json();
  render();
}

function getClass(status){
  if(status === "hot") return "hot";
  if(status === "warm") return "warm";
  return "cold";
}

// RENDER
function render(){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  leads.forEach(l=>{
    const tr = document.createElement("tr");
    tr.className = getClass(l.status);

    tr.innerHTML = `
      <td>${l.name}</td>
      <td>${l.email}</td>
      <td>${l.phone}</td>

      <td>
        <select onchange="updateStatus(${l.id}, this.value)">
          <option value="cold" ${l.status==="cold"?"selected":""}>Frio</option>
          <option value="warm" ${l.status==="warm"?"selected":""}>Morno</option>
          <option value="hot" ${l.status==="hot"?"selected":""}>Quente</option>
        </select>
      </td>

      <td>
        <button onclick="del(${l.id})">Excluir</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("total").innerText = leads.length;
}

// UPDATE STATUS
async function updateStatus(id, status){
  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"PATCH",
    headers:{
      'Content-Type':'application/json',
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    },
    body:JSON.stringify({status})
  });

  load();
}

// DELETE
async function del(id){
  if(!confirm("Excluir?")) return;

  await fetch(`https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?id=eq.${id}`, {
    method:"DELETE",
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  load();
}

load();

</script>

</body>
</html>
