<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{
color:#d4af37;
}

.login-box{
max-width:300px;
margin:100px auto;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#000;
border:1px solid rgba(0,255,136,0.3);
color:#fff;
}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
margin:5px;
}

button:hover{
background:#d4af37;
color:#000;
}

.hidden{display:none;}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
border:1px solid rgba(0,255,136,0.1);
padding:20px;
min-width:180px;
}

.card h2{
margin:0;
font-size:28px;
color:#00ff88;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th, .table td{
padding:12px;
border-bottom:1px solid rgba(0,255,136,0.2);
}

.table th{
color:#00ff88;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h1>Admin Access</h1>
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="panel" class="hidden">

<div class="topbar">
<h1>Emerald Guardian</h1>
<button onclick="logout()">Logout</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="card">
<div>Total Leads</div>
<h2 id="totalLeads">0</h2>
</div>

<div class="card">
<div>Hoje</div>
<h2 id="todayLeads">0</h2>
</div>
</div>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

// 🔒 SENHA
const ADMIN_PASSWORD = "1234";

// LOGIN
function login(){
  const pass = document.getElementById("password").value;

  if(pass === ADMIN_PASSWORD){
    localStorage.setItem("admin_auth","true");
    showPanel();
  }else{
    alert("Senha incorreta");
  }
}

// LOGOUT
function logout(){
  localStorage.removeItem("admin_auth");
  location.reload();
}

// MOSTRAR PAINEL
function showPanel(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadLeads();
}

// AUTO LOGIN
if(localStorage.getItem("admin_auth") === "true"){
  showPanel();
}

// CARREGAR LEADS
async function loadLeads(){
  try{
    const response = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
      headers:{
        'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
        'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
      }
    });

    const data = await response.json();

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let today = 0;
    const now = new Date().toDateString();

    data.forEach(lead=>{
      const leadDate = new Date(lead.created_at).toDateString();
      if(leadDate === now) today++;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${lead.name}</td>
        <td>${lead.email}</td>
        <td>${lead.phone}</td>
        <td>${lead.ddi}</td>
        <td>${new Date(lead.created_at).toLocaleString()}</td>
      `;

      tbody.appendChild(tr);
    });

    document.getElementById("totalLeads").innerText = data.length;
    document.getElementById("todayLeads").innerText = today;

  }catch(err){
    console.error(err);
    alert("Erro ao carregar dados");
  }
}

// 🔄 AUTO REFRESH A CADA 10s
setInterval(()=>{
  if(localStorage.getItem("admin_auth") === "true"){
    loadLeads();
  }
},10000);

</script>

</body>
</html>
