<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{color:#d4af37;}

button{
padding:10px 20px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
margin:5px;
}

button:hover{
background:#d4af37;
color:#000;
}

input, select{
padding:10px;
margin:5px;
background:#000;
border:1px solid rgba(0,255,136,0.3);
color:#fff;
}

.hidden{display:none;}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th, .table td{
padding:12px;
border-bottom:1px solid rgba(0,255,136,0.2);
}

.table th{color:#00ff88;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}
</style>
</head>

<body>

<div id="loginBox">
<h1>Admin Access</h1>
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="panel" class="hidden">

<div class="topbar">
<h1>Emerald Guardian</h1>
<div>
<button onclick="exportCSV()">Exportar CSV</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- FILTROS -->
<div>
<input type="text" id="search" placeholder="Buscar nome ou email" onkeyup="applyFilters()">

<select id="filterCountry" onchange="applyFilters()">
<option value="">Todos os países</option>
<option value="Brazil (+55)">Brazil</option>
<option value="USA (+1)">USA</option>
<option value="UK (+44)">UK</option>
</select>
</div>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

const ADMIN_PASSWORD = "1234";
let allLeads = [];

function login(){
  if(document.getElementById("password").value === ADMIN_PASSWORD){
    localStorage.setItem("admin_auth","true");
    showPanel();
  }else{
    alert("Senha incorreta");
  }
}

function logout(){
  localStorage.removeItem("admin_auth");
  location.reload();
}

function showPanel(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadLeads();
}

if(localStorage.getItem("admin_auth") === "true"){
  showPanel();
}

async function loadLeads(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  const data = await res.json();
  allLeads = data;
  renderTable(data);
}

function renderTable(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(lead=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${lead.name}</td>
      <td>${lead.email}</td>
      <td>${lead.phone}</td>
      <td>${lead.ddi}</td>
      <td>${new Date(lead.created_at).toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  });
}

// 🔍 FILTROS
function applyFilters(){
  const search = document.getElementById("search").value.toLowerCase();
  const country = document.getElementById("filterCountry").value;

  const filtered = allLeads.filter(l=>{
    const matchText = 
      l.name.toLowerCase().includes(search) ||
      l.email.toLowerCase().includes(search);

    const matchCountry = !country || l.ddi === country;

    return matchText && matchCountry;
  });

  renderTable(filtered);
}

// EXPORT CSV
async function exportCSV(){
  const data = allLeads;

  if(data.length === 0){
    alert("Sem dados");
    return;
  }

  let csv = "Nome,Email,Telefone,Pais,Data\n";

  data.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.ddi}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

</script>

</body>
</html>
