<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Admin</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui;
padding:30px;
}

h1{
color:#d4af37;
}

.login-box{
max-width:300px;
margin:100px auto;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#000;
border:1px solid rgba(0,255,136,0.3);
color:#fff;
}

button{
padding:12px 20px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
cursor:pointer;
}

button:hover{
background:#d4af37;
color:#000;
}

.hidden{
display:none;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.table th, .table td{
padding:12px;
border-bottom:1px solid rgba(0,255,136,0.2);
}

.table th{
color:#00ff88;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h1>Admin Access</h1>
<input type="password" id="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="panel" class="hidden">
<h1>Emerald Guardian - Leads</h1>

<table class="table">
<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>País</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>

// 🔒 SENHA
const ADMIN_PASSWORD = "1234";

// LOGIN
function login(){
  const pass = document.getElementById("password").value;

  if(pass === ADMIN_PASSWORD){
    localStorage.setItem("admin_auth","true");
    showPanel();
  }else{
    alert("Senha incorreta");
  }
}

// MOSTRAR PAINEL
function showPanel(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  loadLeads();
}

// VERIFICA SE JÁ ESTÁ LOGADO
if(localStorage.getItem("admin_auth") === "true"){
  showPanel();
}

// CARREGAR LEADS
async function loadLeads(){
  try{
    const response = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
      headers:{
        'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
        'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
      }
    });

    const data = await response.json();

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.reverse().forEach(lead=>{
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${lead.name}</td>
        <td>${lead.email}</td>
        <td>${lead.phone}</td>
        <td>${lead.ddi}</td>
        <td>${new Date(lead.created_at).toLocaleString()}</td>
      `;

      tbody.appendChild(tr);
    });

  }catch(err){
    console.error(err);
    alert("Erro ao carregar dados");
  }
}

</script>

</body>
</html>
