<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald CRM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
background:#fff;
color:#222;
font-family:Arial, sans-serif;
padding:20px;
font-size:12px;
}

h1{
color:#b8962e;
font-size:20px;
margin-bottom:10px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

button{
padding:6px 12px;
border:1px solid #b8962e;
background:#fff;
color:#b8962e;
cursor:pointer;
font-size:12px;
}

button:hover{
background:#b8962e;
color:#fff;
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:15px;
}

.card{
border:1px solid #ddd;
padding:10px;
min-width:120px;
}

.card strong{
font-size:16px;
}

.section{
margin-top:20px;
}

canvas{
max-height:200px;
}

/* TABELA COMPACTA */
.table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.table th, .table td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:left;
}

.table th{
background:#f5f5f5;
font-weight:600;
}

.rank{
color:#b8962e;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<h1>Emerald CRM</h1>
<div>
<button onclick="exportCSV()">Exportar</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard">
<div class="card">
Total<br><strong id="total">0</strong>
</div>

<div class="card">
Hoje<br><strong id="today">0</strong>
</div>
</div>

<div class="section">
<h1>Leads por Dia</h1>
<canvas id="chart"></canvas>
</div>

<div class="section">
<h1>Ranking</h1>
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Interações</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<script>

let leads = [];

function logout(){
  localStorage.removeItem("auth");
  location.reload();
}

async function load(){
  const res = await fetch('https://mihrsfotrbigixqkpwhu.supabase.co/rest/v1/leads?select=*', {
    headers:{
      'apikey':'sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL',
      'Authorization':'Bearer sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL'
    }
  });

  leads = await res.json();

  stats();
  chart();
  ranking();
}

function stats(){
  document.getElementById("total").innerText = leads.length;

  const today = new Date().toDateString();
  let count = 0;

  leads.forEach(l=>{
    if(new Date(l.created_at).toDateString() === today) count++;
  });

  document.getElementById("today").innerText = count;
}

function chart(){
  const map = {};

  leads.forEach(l=>{
    const d = new Date(l.created_at).toLocaleDateString();
    map[d] = (map[d] || 0) + 1;
  });

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:Object.keys(map),
      datasets:[{
        data:Object.values(map)
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:10}}},
        y:{ticks:{font:{size:10}}}
      }
    }
  });
}

function ranking(){
  const count = {};

  leads.forEach(l=>{
    count[l.name] = (count[l.name] || 0) + 1;
  });

  const sorted = Object.entries(count).sort((a,b)=>b[1]-a[1]);

  const tbody = document.getElementById("ranking");
  tbody.innerHTML = "";

  sorted.forEach((r,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
    `;

    tbody.appendChild(tr);
  });
}

function exportCSV(){
  let csv = "Nome,Email,Telefone,Data\n";

  leads.forEach(l=>{
    csv += `"${l.name}","${l.email}","${l.phone}","${l.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  a.click();
}

load();

</script>

</body>
</html>
