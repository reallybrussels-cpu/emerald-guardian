<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian STABLE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SECTIONS FIXED */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.6s ease;
}

.section.active{
opacity:1;
pointer-events:auto;
}

/* TEXT */
h1{font-family:'Playfair Display';font-size:56px;color:gold;}
h2{font-size:26px;font-weight:300;text-align:center;}

/* IMAGES */
.shield{width:200px;margin-bottom:20px;}
.felino{width:340px;max-width:85%;margin-bottom:20px;}

/* INPUT */
.input-group{
position:relative;
width:280px;
margin:15px 0;
}

.input-group input{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,255,136,0.3);
color:white;
padding:10px 0;
outline:none;
}

.input-group label{
position:absolute;
top:10px;
left:0;
font-size:12px;
color:#888;
transition:0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:10px;
color:#00ff88;
}

/* DROPDOWN */
.dropdown{
width:280px;
margin:15px 0;
position:relative;
cursor:pointer;
}

.dropdown-selected{
border-bottom:1px solid rgba(0,255,136,0.3);
padding:10px 0;
background:black;
}

.dropdown-list{
display:none;
position:absolute;
top:100%;
left:0;
width:100%;
background:black;
border:1px solid #00ff88;
max-height:180px;
overflow:auto;
z-index:1000;
}

.dropdown.open .dropdown-list{
display:block;
}

.dropdown-item{
padding:10px;
background:black;
}

.dropdown-item:hover{
background:#002b1a;
}

/* BUTTON */
.btn{
padding:14px 30px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
}

/* FORM */
.form-container{
width:320px;
padding:30px;
border:1px solid rgba(0,255,136,0.1);
background:black;
}

.success{color:#00ff88;}
</style>
</head>

<body>

<!-- 1 -->
<div class="section active" id="s1">
<img src="1977.png" class="shield">
<h1>Emerald Guardian</h1>

<div class="input-group">
<input id="code" placeholder=" ">
<label>ACCESS CODE</label>
</div>

<button class="btn" onclick="enterSite()">ENTER</button>
</div>

<!-- 2 -->
<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button class="btn" onclick="nextSafe(3)">CONTINUE</button>
</div>

<!-- 3 -->
<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="nextSafe(4)">CONTINUE</button>
</div>

<!-- 4 -->
<div class="section" id="s4">
<img src="1979.png" class="felino">
<h2>A singular piece</h2>
<button class="btn" onclick="nextSafe(5)">CONTINUE</button>
</div>

<!-- 5 -->
<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="nextSafe(6)">CONTINUE</button>
</div>

<!-- 6 -->
<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="nextSafe(7)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s7">
<div class="form-container">

<h2>Request Access</h2>

<form id="formEG">

<div class="input-group">
<input name="name" placeholder=" " required>
<label>FULL NAME</label>
</div>

<div class="input-group">
<input name="email" placeholder=" " required>
<label>EMAIL ADDRESS</label>
</div>

<div class="dropdown" id="dropdown">
<div class="dropdown-selected">Select Country</div>
<div class="dropdown-list">
<div class="dropdown-item">Brazil (+55)</div>
<div class="dropdown-item">USA (+1)</div>
<div class="dropdown-item">UK (+44)</div>
</div>
</div>

<input type="hidden" name="ddi" id="ddi">

<div class="input-group">
<input name="phone" placeholder=" " required>
<label>PHONE</label>
</div>

<button class="btn">SUBMIT</button>

</form>

</div>
</div>

<!-- SUCCESS -->
<div class="section" id="s8">
<h2 class="success">Request sent successfully</h2>
<button class="btn" onclick="nextSafe(1)">RETURN</button>
</div>

<script>

/* ENTER */
function enterSite(){
const code = document.getElementById("code").value.trim();
if(code===""){alert("Enter access code");return;}
nextSafe(2);
}

/* NAV FIX DEFINITIVO */
function nextSafe(n){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});
document.getElementById("s"+n).classList.add("active");
}

/* DROPDOWN */
const dropdown=document.getElementById("dropdown");
const selected=dropdown.querySelector(".dropdown-selected");
const items=dropdown.querySelectorAll(".dropdown-item");
const hidden=document.getElementById("ddi");

selected.onclick=()=>dropdown.classList.toggle("open");

items.forEach(item=>{
item.onclick=()=>{
selected.innerText=item.innerText;
hidden.value=item.innerText;
dropdown.classList.remove("open");
};
});

document.onclick=(e)=>{
if(!dropdown.contains(e.target)){
dropdown.classList.remove("open");
}
};

/* FORM */
document.getElementById("formEG").addEventListener("submit",function(e){
e.preventDefault();
nextSafe(8);
});

</script>

</body>
</html>
