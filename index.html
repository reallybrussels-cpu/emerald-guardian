<!DOCTYPE html>
<html lang="en">
<head>

<title>Emerald Guardian</title>

<style>

.section.active{opacity:1}

input,select{margin:10px;padding:10px;width:260px;background:black;color:white;border:1px solid #00ffa6}
button{padding:10px 30px;background:gold;border:none;cursor:pointer}
.success{color:#00ffa6;font-size:22px}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<button onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<p>We will contact you shortly</p>
<button onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form=document.getElementById("formEG");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
})
.then(()=>{
next(8);
form.reset();
});
});
</script>
