<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
color:white;
overflow:hidden;

/* FUNDO CORRETO (PDF) */
background: linear-gradient(
to bottom,
#0a5c2f 0%,
#000000 50%,
#0a5c2f 100%
);
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h2 {
font-weight:300;
margin-bottom:40px;
}

.form-row {
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

input, select {
padding:12px;
width:220px;
background:transparent;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="section">

<h2>Request Direct Access</h2>

<form action="mailto:really.brussels@gmail.com" method="POST" enctype="text/plain">

<div class="form-row">

<input name="Nome" placeholder="Full Name" required>

<input name="Email" placeholder="Email" required>

<select name="DDI" required>
<option value="">DDI</option>
<option value="+55">+55 Brazil</option>
<option value="+1">+1 USA</option>
<option value="+44">+44 UK</option>
<option value="+49">+49 Germany</option>
<option value="+33">+33 France</option>
<option value="+34">+34 Spain</option>
</select>

<input name="Telefone" placeholder="Phone Number" required>

</div>

<button type="submit">SEND</button>

</form>

</div>

</body>
</html>
