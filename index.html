<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1.2s ease;
}

.section.active{
opacity:1;
pointer-events:auto;
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
color:gold;
text-shadow:0 0 25px gold;
}

/* SHIELD */
.shield{
width:120px;
height:140px;
border:2px solid gold;
border-radius:20px 20px 40px 40px;
position:relative;
margin-bottom:20px;
box-shadow:0 0 20px gold;
animation:pulseShield 2.5s infinite;
}

.shield:before{
content:"";
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:60%;
height:60%;
border:1px solid #00ff88;
border-radius:10px;
box-shadow:0 0 15px #00ff88;
}

@keyframes pulseShield{
0%{transform:scale(1); opacity:0.8;}
50%{transform:scale(1.05); opacity:1;}
100%{transform:scale(1); opacity:0.8;}
}

/* LINE */
.line{
width:400px;
height:2px;
background:linear-gradient(90deg,transparent,#00ff88,transparent);
box-shadow:0 0 15px #00ff88;
margin:20px 0;
}

/* BUTTON */
.btn{
width:300px;
padding:14px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
transition:0.4s;
}

.btn:hover{
background:gold;
color:black;
box-shadow:0 0 20px gold;
}

/* FORM */
form{
display:flex;
flex-direction:column;
align-items:center;
}

input, select{
width:300px;
padding:14px;
margin:10px;
background:rgba(0,0,0,0.8);
border:1px solid #00ffa6;
color:white;
text-align:center;
transition:0.3s;
}

input:focus, select:focus{
border:1px solid #00ff88;
box-shadow:0 0 15px #00ff88;
outline:none;
}

.success{
color:#00ffa6;
font-size:24px;
}
</style>
</head>

<body>

<div class="section active" id="s1">
<div class="shield"></div>
<h1>Emerald Guardian</h1>
<div class="line"></div>
<input placeholder="ACCESS CODE">
<button class="btn" onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s7">
<div class="shield"></div>
<h2>Request Access</h2>
<div class="line"></div>

<form id="formEG">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
</select>

<input name="phone" placeholder="Phone" required>

<button class="btn">SEND</button>
</form>
</div>

<div class="section" id="s8">
<div class="shield"></div>
<h2 class="success">Request received successfully</h2>
<div class="line"></div>
<button class="btn" onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form=document.getElementById("formEG");
form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
}).then(()=>{
next(8);
});
});
</script>

</body>
</html>
