<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
color:white;
overflow:hidden;

/* FUNDO CORRETO */
background: linear-gradient(to bottom, #0a5c2f 0%, #000 50%, #0a5c2f 100%);
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

/* FORM */
.form-row {
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

input, select {
padding:12px;
width:220px;
background:transparent;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<!-- TELA 1 -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<!-- TELA 2 -->
<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<!-- TELA 3 -->
<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<!-- TELA 4 -->
<div class="section" id="s4">
<h2>A singular piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<!-- TELA 5 -->
<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<!-- TELA 6 -->
<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- TELA 7 (FINAL CORRETA) -->
<div class="section" id="s7">

<h2>Request Direct Access</h2>

<form action="mailto:really.brussels@gmail.com" method="POST" enctype="text/plain">

<div class="form-row">

<input name="Nome" placeholder="Full Name" required>
<input name="Email" placeholder="Email" required>

<select name="DDI">
<option value="">DDI</option>
<option>+55</option>
<option>+1</option>
<option>+44</option>
<option>+49</option>
<option>+33</option>
</select>

<input name="Telefone" placeholder="Phone Number" required>

</div>

<button type="submit">SEND</button>

</form>

</div>

<script>

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

</script>

</body>
</html>
