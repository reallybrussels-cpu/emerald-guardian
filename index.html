<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian STABLE FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SAFE SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
}

.section.active{
opacity:1;
pointer-events:auto;
}

/* SHIELD FIX (INLINE SAFE) */
.shield{
width:180px;
margin-bottom:25px;
opacity:0.95;
filter: drop-shadow(0 0 12px #00ff88) drop-shadow(0 0 18px gold);
}

/* TITLE */
h1{
font-family:'Playfair Display',serif;
font-size:52px;
color:gold;
text-shadow:0 0 20px gold;
}

/* LINE */
.line{
width:380px;
height:2px;
background:linear-gradient(90deg, transparent, #00ff88, transparent);
box-shadow:0 0 15px #00ff88;
margin:20px 0;
}

/* BUTTON */
.btn{
width:280px;
padding:14px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
transition:0.3s;
}

.btn:hover{
background:gold;
color:black;
}

/* FORM LOCKED VERTICAL */
form{
display:flex;
flex-direction:column;
align-items:center;
}

input, select{
width:280px;
padding:14px;
margin:8px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

/* SUCCESS */
.success{
color:#00ffa6;
font-size:22px;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div class="section active" id="s1">
<img src="https://i.imgur.com/escudo.png" class="shield">
<h1>Emerald Guardian</h1>
<div class="line"></div>
<input id="code" placeholder="ACCESS CODE">
<button class="btn" onclick="nextSafe(2)">ENTER</button>
</div>

<!-- TELA 2 -->
<div class="section" id="s2">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>Exclusive Access</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(3)">CONTINUE</button>
</div>

<!-- TELA 3 -->
<div class="section" id="s3">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>Formed over millions of years</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(4)">CONTINUE</button>
</div>

<!-- TELA 4 -->
<div class="section" id="s4">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>A singular piece</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(5)">CONTINUE</button>
</div>

<!-- TELA 5 -->
<div class="section" id="s5">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>Absolute rarity</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(6)">CONTINUE</button>
</div>

<!-- TELA 6 -->
<div class="section" id="s6">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>Private and selective</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(7)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s7">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2>Request Access</h2>
<div class="line"></div>

<form id="formEG">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
</select>

<input name="phone" placeholder="Phone" required>

<button class="btn">SEND</button>
</form>
</div>

<!-- SUCCESS -->
<div class="section" id="s8">
<img src="https://i.imgur.com/placeholder.png" class="shield">
<h2 class="success">Request received successfully</h2>
<div class="line"></div>
<button class="btn" onclick="nextSafe(1)">RETURN</button>
</div>

<script>
function nextSafe(n){
let target = document.getElementById("s"+n);
if(!target) return;

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});

target.classList.add("active");
}

const form=document.getElementById("formEG");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
}).then(()=>{
nextSafe(8);
form.reset();
}).catch(()=>{
alert("Erro no envio");
});
});
</script>

</body>
</html>
