<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
}
.section.active{opacity:1;pointer-events:auto;}

h1{
font-family:'Playfair Display',serif;
font-size:56px;
color:gold;
}

h2{
font-weight:300;
font-size:26px;
text-align:center;
}

/* INPUT PADRÃO (LINHA, NÃO CAIXA) */
input, select{
background:transparent;
border:none;
border-bottom:1px solid rgba(0,255,136,0.3);
color:white;
padding:12px 0;
margin:12px 0;
width:260px;
text-align:left;
outline:none;
}

/* FOCO VERDE */
input:focus, select:focus{
border-bottom:1px solid #00ff88;
box-shadow:0 6px 10px -6px #00ff88;
}

/* BOTÃO */
.btn{
padding:14px 30px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
}

.btn:hover{
background:gold;
color:black;
}

/* FORM LUXO */
.form-container{
width:320px;
padding:40px 30px;
border:1px solid rgba(0,255,136,0.1);
}

/* SUCCESS */
.success{
color:#00ff88;
font-size:22px;
}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input placeholder="ACCESS CODE">
<button class="btn" onclick="nextSafe(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button class="btn" onclick="nextSafe(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="nextSafe(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button class="btn" onclick="nextSafe(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="nextSafe(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="nextSafe(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<div class="form-container">

<h2>Request Access</h2>

<form id="formEG">

<input name="name" placeholder="FULL NAME" required>
<input name="email" placeholder="EMAIL ADDRESS" required>

<select name="ddi">
<option value="">COUNTRY</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Germany (+49)</option>
<option>France (+33)</option>
<option>Italy (+39)</option>
<option>Spain (+34)</option>
<option>Portugal (+351)</option>
<option>Canada (+1)</option>
<option>Australia (+61)</option>
<option>Japan (+81)</option>
<option>China (+86)</option>
<option>India (+91)</option>
</select>

<input name="phone" placeholder="PHONE NUMBER" required>

<button type="submit" class="btn">SUBMIT REQUEST</button>

</form>

</div>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<button class="btn" onclick="nextSafe(1)">RETURN</button>
</div>

<script>
function nextSafe(n){
let target=document.getElementById("s"+n);
if(!target)return;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
target.classList.add("active");
}

const form=document.getElementById("formEG");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
}).then(()=>{
nextSafe(8);
form.reset();
}).catch(()=>{
alert("Erro no envio - verifique conexão");
});

});
</script>

</body>
</html>
