<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>
body {margin:0;font-family:'Georgia',serif;color:white;background:#000;overflow:hidden;}
.section {position:absolute;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;opacity:0;transition:1s;pointer-events:none;}
.section.active {opacity:1;pointer-events:auto;}

input, select {
padding:12px;width:260px;margin:10px;
background:transparent;border:1px solid #00ffa6;color:white;text-align:center;
}

button {
padding:12px 35px;
background:linear-gradient(90deg,#e6c200,#b89600);
border:none;cursor:pointer;
}

.guardian {perspective:800px;width:420px;}
.puma-img {width:100%;opacity:0;transform:translateY(40px);}

.puma-active {
animation:fadeIn 2s forwards, float 6s infinite 2s;
opacity:1;
}

@keyframes fadeIn {to{opacity:1;transform:translateY(0);}}
@keyframes float {50%{transform:translateY(-8px);}}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="check()">ENTER</button>
</div>

<!-- FLOW -->
<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<!-- PUMA -->
<div class="section" id="s4">
<div class="guardian">
<img src="puma.png" class="puma-img">
</div>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s7">

<h2>Request Direct Access</h2>

<form action="https://formsubmit.co/really.brussels@gmail.com" method="POST">

<!-- SEGUNDO EMAIL -->
<input type="hidden" name="_cc" value="realede@yahoo.com.br">

<input name="Nome" placeholder="Nome" required>

<input name="Email" type="email" placeholder="Email" required>

<select name="DDI" required>
<option value="">DDI</option>
<option>+55 Brasil</option>
<option>+1 USA</option>
<option>+44 UK</option>
<option>+33 França</option>
<option>+49 Alemanha</option>
<option>+39 Itália</option>
<option>+34 Espanha</option>
<option>+351 Portugal</option>
<option>+971 UAE</option>
<option>+86 China</option>
<option>+81 Japão</option>
<option>+91 Índia</option>
<option>+7 Rússia</option>
<option>+27 África do Sul</option>
<option>+52 México</option>
<option>+54 Argentina</option>
<option>+56 Chile</option>
<option>+57 Colômbia</option>
<option>+61 Austrália</option>
<option>+64 Nova Zelândia</option>
</select>

<input name="Telefone" placeholder="Telefone" required>

<button type="submit">SUBMIT</button>

</form>

</div>

<script>

function check(){
let code=document.getElementById("code").value;
if(code==="123A"){next(2);}else{alert("Invalid code");}
}

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===4){
setTimeout(()=>{
document.querySelector(".puma-img").classList.add("puma-active");
},1000);
}
}

</script>

</body>
</html>
