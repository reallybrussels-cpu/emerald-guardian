<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family: 'Georgia', serif;
color:white;
overflow:hidden;
background:#000;
}

/* SECTIONS */
.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
opacity:0;
filter:blur(10px);
transition: all 1s ease;
pointer-events:none;
}

.section.active {
opacity:1;
filter:blur(0);
pointer-events:auto;
}

/* INPUT */
input, select {
padding:12px;
width:260px;
background:transparent;
border:1px solid rgba(0,255,150,0.4);
color:white;
text-align:center;
margin:10px;
outline:none;
}

input.error {
border-color:red;
}

button {
padding:12px 35px;
background:linear-gradient(90deg,#e6c200,#b89600);
border:none;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<!-- TELA 7 -->
<div class="section active" id="s7">

<h2>Request Direct Access</h2>

<input id="nome" placeholder="Nome">

<input id="email" placeholder="Email">

<select id="ddi">
<option value="">DDI</option>
<option value="+55">Brasil +55</option>
<option value="+1">USA +1</option>
<option value="+44">UK +44</option>
<option value="+351">Portugal +351</option>
</select>

<input id="telefone" placeholder="Telefone">

<button onclick="validar()">SUBMIT</button>

<p id="erro" style="color:red;"></p>

</div>

<script>

function validar(){

let nome = document.getElementById("nome");
let email = document.getElementById("email");
let telefone = document.getElementById("telefone");
let ddi = document.getElementById("ddi");
let erro = document.getElementById("erro");

erro.innerText = "";

// reset
[nome,email,telefone].forEach(i=>i.classList.remove("error"));

/* VALIDAÇÃO NOME */
if(nome.value.trim() === ""){
erro.innerText = "Nome obrigatório";
nome.classList.add("error");
return;
}

/* BLOQUEIO SCRIPT */
let proibido = /<|>|script|SELECT|INSERT|DROP/i;

if(proibido.test(nome.value) || proibido.test(email.value)){
erro.innerText = "Entrada inválida";
return;
}

/* VALIDAÇÃO EMAIL */
let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email.value)){
erro.innerText = "Email inválido";
email.classList.add("error");
return;
}

/* DDI */
if(ddi.value === ""){
erro.innerText = "Selecione o DDI";
return;
}

/* TELEFONE */
if(telefone.value.length < 8){
erro.innerText = "Telefone inválido";
telefone.classList.add("error");
return;
}

/* SUCESSO */
alert("Request sent successfully");

}

</script>

</body>
</html>
