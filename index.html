<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
background: radial-gradient(circle at top, #021d1a, #000);
color:white;
overflow:hidden;
}

/* SEÇÕES */
.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:0.8s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

/* INPUTS */
input, select {
padding:14px;
margin:10px;
width:260px;
background:rgba(0,0,0,0.7);
border:1px solid #00ffa6;
color:white;
outline:none;
}

/* BOTÃO */
button {
padding:14px 40px;
background:linear-gradient(45deg, gold, #ffd700);
border:none;
cursor:pointer;
font-weight:bold;
letter-spacing:1px;
}

/* TITULOS */
h1, h2 {
letter-spacing:2px;
text-shadow:0 0 10px #00ffa6;
}

/* PUMA */
.guardian {
width:420px;
}

.puma-img {
width:100%;
opacity:0;
transform:translateY(40px);
filter:brightness(0) invert(1) drop-shadow(0 0 10px #00ffa6);
}

.puma-active {
animation:fade 2s forwards, float 6s infinite 2s;
}

@keyframes fade {
to {opacity:1;transform:translateY(0);}
}

@keyframes float {
50% {transform:translateY(-10px);}
}

</style>
</head>

<body>

<!-- S1 LOGIN -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" type="password" placeholder="ACCESS CODE">
<button onclick="login()">ENTER</button>
<p id="erro"></p>
</div>

<!-- S2 PUMA -->
<div class="section" id="s2">
<div class="guardian">
<img src="puma.png" class="puma-img">
</div>
<button onclick="next(3)">CONTINUE</button>
</div>

<!-- S3 NOME -->
<div class="section" id="s3">
<h2>Identification</h2>
<input id="nome" placeholder="Full Name">
<button onclick="next(4)">NEXT</button>
</div>

<!-- S4 EMAIL -->
<div class="section" id="s4">
<h2>Contact</h2>
<input id="email" placeholder="Email">
<button onclick="next(5)">NEXT</button>
</div>

<!-- S5 DDI -->
<div class="section" id="s5">
<h2>Location</h2>
<select id="ddi">
<option value="">DDI</option>
<option value="55">Brazil +55</option>
<option value="1">USA +1</option>
<option value="44">UK +44</option>
</select>
<button onclick="next(6)">NEXT</button>
</div>

<!-- S6 TELEFONE -->
<div class="section" id="s6">
<h2>Phone</h2>
<input id="telefone" placeholder="Phone Number">
<button onclick="next(7)">NEXT</button>
</div>

<!-- S7 CONFIRM -->
<div class="section" id="s7">
<h2>Confirm</h2>
<button onclick="enviar()">SUBMIT</button>
<p id="msg"></p>
</div>

<!-- S8 SUCESSO -->
<div class="section" id="s8">
<h2>✔ Request Sent</h2>
<p style="max-width:400px;text-align:center;">
Thank you for your interest in <b>Emerald Guardian</b>.<br><br>
Our team will contact you shortly.
</p>
<button onclick="reiniciar()">FINISH</button>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
  "https://pnwprbbmflbbqduupnke.supabase.co",
  "sb_publishable_kFKfsQu13MtS8ath-2ZeeQ_-o0wxBUp"
)

/* LOGIN */
window.login = function(){
let code=document.getElementById("code").value;

if(code==="123A"){
next(2);
}else{
document.getElementById("erro").innerText="Access denied";
}
}

/* ENVIO */
window.enviar = async function(){

let nome=document.getElementById("nome").value;
let email=document.getElementById("email").value;
let ddi=document.getElementById("ddi").value;
let telefone=document.getElementById("telefone").value;

if(!nome || !email || !ddi || !telefone){
document.getElementById("msg").innerText="Complete all fields";
return;
}

let telefoneFinal = ddi + telefone;

let { error } = await supabase
.from("leads")
.insert([{ nome, email, telefone: telefoneFinal }])

if(error){
document.getElementById("msg").innerText="Error sending";
}else{

// LIMPAR
document.getElementById("nome").value="";
document.getElementById("email").value="";
document.getElementById("ddi").value="";
document.getElementById("telefone").value="";
document.getElementById("msg").innerText="";

// IR PARA SUCESSO
next(8);

}
}

/* NAV */
window.next = function(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===2){
setTimeout(()=>{
document.querySelector(".puma-img").classList.add("puma-active");
},800);
}
}

/* RESET */
window.reiniciar = function(){
next(1);
}

</script>

</body>
</html>
