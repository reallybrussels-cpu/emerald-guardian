<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

html, body {
margin:0;
height:100%;
font-family:'Inter', sans-serif;
color:white;
background: radial-gradient(circle at center, #0b5d2a 0%, #000000 70%);
overflow:hidden;
}

/* TELAS */
.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transform: scale(1.05);
transition: opacity 1s ease, transform 1s ease;
pointer-events:none;
}

.section.active {
opacity:1;
transform: scale(1);
pointer-events:auto;
}

h1, h2 {
font-family: 'Playfair Display', serif;
letter-spacing: 1px;
}

h1 {
font-size:60px;
color:#e6c200;
text-shadow: 0 0 15px gold;
}

.highlight {
color:#00ffa6;
text-shadow: 0 0 10px #00ffa6;
}

/* BOTÃO */
button {
padding:14px 50px;
background: linear-gradient(45deg, gold, #e6c200);
border:none;
cursor:pointer;
margin-top:25px;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

button:hover {
transform: scale(1.05);
box-shadow: 0 0 20px gold;
}

/* FORM */
.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

input, select {
padding:14px;
width:300px;
background: rgba(0,0,0,0.7);
border:1px solid #00ffa6;
color:white;
text-align:center;
transition:0.3s;
}

input:focus, select:focus {
outline:none;
border-color:gold;
box-shadow: 0 0 10px gold;
}

/* TELA FINAL */
.success {
font-size:28px;
color:#00ffa6;
text-shadow: 0 0 15px #00ffa6;
animation: fadeIn 2s ease;
}

.subtext {
margin-top:15px;
opacity:0.7;
font-size:14px;
animation: fadeIn 3s ease;
}

@keyframes fadeIn {
from {opacity:0; transform: translateY(20px);}
to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- TELAS 1 a 6 (iguais) -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s7">
<h2>Request Direct Access</h2>

<form id="formEG" class="form-column">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="ddi" required>
<option value="">Select Country</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Germany (+49)</option>
<option>France (+33)</option>
</select>

<input type="text" name="phone" placeholder="Phone" required>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<button type="submit" id="submitBtn">SEND</button>

</form>
</div>

<!-- TELA FINAL CINEMATOGRÁFICA -->
<div class="section" id="s8">
<h2 class="success">Access Request Received</h2>
<div class="subtext">Our team will contact you privately.</div>
<button onclick="next(1)">RETURN</button>
</div>

<script>

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

/* ENVIO CINEMATOGRÁFICO */
const form = document.getElementById("formEG");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e){
e.preventDefault();

btn.innerText = "SENDING...";
btn.disabled = true;

const data = new FormData(form);

fetch("https://formsubmit.co/really.brussels@gmail.com", {
method: "POST",
body: data
})
.then(response => {
if(response.ok){

setTimeout(() => {
next(8); // vai para tela final
form.reset();
}, 1000);

} else {
btn.innerText = "ERROR";
}
})
.catch(() => {
btn.innerText = "FAILED";
});

});

</script>

</body>
</html>
