<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

html, body {
margin:0;
height:100%;
font-family:'Georgia', serif;
color:white;

background: linear-gradient(
to bottom,
#0b5d2a 0%,
#000000 50%,
#0b5d2a 100%
);
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

h1 { font-size:60px; color:#e6c200; }
.highlight { color:#00ffa6; }

button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

/* FORM VERTICAL PADRÃO */
.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

/* 🔥 TODOS IGUAIS AGORA */
input, select {
padding:12px;
width:300px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<!-- TELAS -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- TELA FINAL -->
<div class="section" id="s7">

<h2>Request Direct Access</h2>

<div class="form-column">

<input placeholder="Full Name">
<input placeholder="Email">

<select>
<option value="">Select Country Code</option>

<option value="+55">Brazil +55</option>
<option value="+1">USA / Canada +1</option>
<option value="+44">United Kingdom +44</option>
<option value="+49">Germany +49</option>
<option value="+33">France +33</option>
<option value="+39">Italy +39</option>
<option value="+34">Spain +34</option>
<option value="+351">Portugal +351</option>
<option value="+31">Netherlands +31</option>
<option value="+32">Belgium +32</option>
<option value="+41">Switzerland +41</option>
<option value="+43">Austria +43</option>
<option value="+46">Sweden +46</option>
<option value="+47">Norway +47</option>
<option value="+45">Denmark +45</option>
<option value="+358">Finland +358</option>
<option value="+48">Poland +48</option>
<option value="+420">Czech Republic +420</option>
<option value="+36">Hungary +36</option>
<option value="+40">Romania +40</option>
<option value="+30">Greece +30</option>
<option value="+90">Turkey +90</option>
<option value="+971">UAE +971</option>
<option value="+966">Saudi Arabia +966</option>
<option value="+91">India +91</option>
<option value="+86">China +86</option>
<option value="+81">Japan +81</option>
<option value="+82">South Korea +82</option>
<option value="+61">Australia +61</option>
<option value="+64">New Zealand +64</option>
<option value="+27">South Africa +27</option>
<option value="+52">Mexico +52</option>
<option value="+54">Argentina +54</option>
<option value="+56">Chile +56</option>
<option value="+57">Colombia +57</option>
<option value="+58">Venezuela +58</option>
<option value="+51">Peru +51</option>

</select>

<input placeholder="Phone">

<button>SEND</button>

</div>

</div>

<script>

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

</script>

</body>
</html>
