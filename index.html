<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emerald Guardian</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Georgia;text-align:center}
.section{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column}
.active{display:flex}
input,select{padding:10px;margin:5px;width:250px}
button{padding:10px 30px;background:gold;border:none;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="s1" class="section active">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="login()">ENTER</button>
<p id="erro"></p>
</div>

<!-- FORM -->
<div id="s2" class="section">
<h2>Request Access</h2>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<select id="ddi">
<option value="">DDI</option>
<option>+55</option>
<option>+1</option>
<option>+44</option>
</select>

<input id="telefone" placeholder="Telefone">

<button onclick="enviar()">SUBMIT</button>

<p id="msg"></p>
</div>

<script>

function login(){
let code=document.getElementById("code").value;
if(code==="123A"){
document.getElementById("s1").classList.remove("active");
document.getElementById("s2").classList.add("active");
}else{
document.getElementById("erro").innerText="Invalid code";
}
}

function enviar(){

let nome=document.getElementById("nome").value;
let email=document.getElementById("email").value;
let ddi=document.getElementById("ddi").value;
let tel=document.getElementById("telefone").value;

if(!nome||!email||!ddi||!tel){
document.getElementById("msg").innerText="Preencha tudo";
return;
}

fetch("https://script.google.com/macros/s/AKfycbyUPhY7Gc2XN1WBQB5KZa8IoexJijO-vf5mQjzIw6pkBW3Uyk8i6fnfZaRvMxzbG2Pm/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
nome:nome,
email:email,
ddi:ddi,
telefone:tel
})
});

document.getElementById("msg").innerText="Enviado com sucesso";

}

</script>

</body>
</html>
