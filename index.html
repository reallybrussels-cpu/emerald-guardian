<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:'Inter',sans-serif;
color:white;
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1.2s ease;
}

.section.active{
opacity:1;
pointer-events:auto;
}

h1{
font-family:'Playfair Display',serif;
font-size:64px;
color:#e6c200;
letter-spacing:2px;
text-shadow:0 0 25px gold;
}

h2{
font-family:'Playfair Display',serif;
font-weight:500;
letter-spacing:1px;
}

.highlight{
color:#00ffa6;
text-shadow:0 0 15px #00ffa6;
}

/* BOTÃO PREMIUM */
.btn{
padding:14px 50px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
transition:0.4s;
position:relative;
overflow:hidden;
}

.btn:before{
content:"";
position:absolute;
width:0;
height:100%;
background:gold;
left:0;
top:0;
transition:0.4s;
z-index:-1;
}

.btn:hover:before{
width:100%;
}

.btn:hover{
color:black;
box-shadow:0 0 20px gold;
}

/* FORM */
input, select{
display:block;
margin:10px;
padding:12px;
width:260px;
background:rgba(0,0,0,0.8);
border:1px solid #00ffa6;
color:white;
text-align:center;
}

.success{
color:#00ffa6;
font-size:26px;
text-shadow:0 0 15px #00ffa6;
}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input placeholder="ACCESS CODE">
<button class="btn" onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button class="btn" onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button class="btn" onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="next(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<h2>Request Access</h2>

<form id="formEG">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
</select>

<input name="phone" placeholder="Phone" required>

<button class="btn">SEND</button>
</form>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<p>We will contact you shortly</p>
<button class="btn" onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form=document.getElementById("formEG");
form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
}).then(()=>{
next(8);
form.reset();
});
});
</script>

</body>
</html>
