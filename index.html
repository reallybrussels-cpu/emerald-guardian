<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transform:scale(1.05);
filter:blur(10px);
transition:all 1s cubic-bezier(0.22,1,0.36,1);
}
.section.active{
opacity:1;
pointer-events:auto;
transform:scale(1);
filter:blur(0);
}

/* TEXT */
h1{font-family:'Playfair Display';font-size:56px;color:gold;}
h2{font-size:26px;font-weight:300;text-align:center;}

.shield{width:200px;margin-bottom:25px;}
.felino{width:340px;max-width:85%;margin-bottom:25px;}

/* INPUT GROUP */
.input-group{
position:relative;
width:280px;
margin:18px 0;
}

.input-group input{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,255,136,0.3);
color:white;
padding:10px 0;
outline:none;
}

.input-group label{
position:absolute;
top:10px;
left:0;
font-size:12px;
color:rgba(255,255,255,0.4);
transition:0.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:10px;
color:#00ff88;
}

.input-group input:focus{
border-bottom:1px solid #00ff88;
box-shadow:0 6px 10px -6px #00ff88;
}

/* CUSTOM DROPDOWN */
.dropdown{
position:relative;
width:280px;
margin:18px 0;
cursor:pointer;
}

.dropdown-selected{
border-bottom:1px solid rgba(0,255,136,0.3);
padding:10px 0;
color:white;
}

.dropdown-list{
position:absolute;
top:100%;
left:0;
width:100%;
background:black;
border:1px solid rgba(0,255,136,0.2);
max-height:180px;
overflow-y:auto;
display:none;
z-index:10;
}

.dropdown.open .dropdown-list{
display:block;
}

.dropdown-item{
padding:10px;
transition:0.2s;
}

.dropdown-item:hover{
background:rgba(0,255,136,0.1);
}

/* BUTTON */
.btn{
padding:14px 30px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
position:relative;
}

.btn.loading{
pointer-events:none;
opacity:0.7;
}

.btn.loading::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:18px;
height:18px;
margin:-9px 0 0 -9px;
border:2px solid gold;
border-top:2px solid transparent;
border-radius:50%;
animation:spin 0.8s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0);}
100%{transform:rotate(360deg);}
}

.form-container{
width:320px;
padding:40px 30px;
border:1px solid rgba(0,255,136,0.1);
}

.success{color:#00ff88;font-size:22px;}
</style>
</head>

<body>

<div class="section active" id="s1">
<img src="1977.png" class="shield">
<h1>Emerald Guardian</h1>
<div class="input-group">
<input placeholder=" ">
<label>ACCESS CODE</label>
</div>
<button class="btn" onclick="nextSafe(2)">ENTER</button>
</div>

<div class="section" id="s7">
<div class="form-container">
<h2>Request Access</h2>

<form id="formEG">

<div class="input-group">
<input name="name" placeholder=" " required>
<label>FULL NAME</label>
</div>

<div class="input-group">
<input name="email" placeholder=" " required>
<label>EMAIL ADDRESS</label>
</div>

<!-- CUSTOM DROPDOWN -->
<div class="dropdown" id="dropdown">
<div class="dropdown-selected">Select Country</div>
<div class="dropdown-list">
<div class="dropdown-item">Brazil (+55)</div>
<div class="dropdown-item">United States (+1)</div>
<div class="dropdown-item">United Kingdom (+44)</div>
<div class="dropdown-item">Germany (+49)</div>
<div class="dropdown-item">France (+33)</div>
</div>
</div>

<input type="hidden" name="ddi" id="ddi">

<div class="input-group">
<input name="phone" placeholder=" " required>
<label>PHONE NUMBER</label>
</div>

<button type="submit" class="btn">SUBMIT REQUEST</button>

</form>
</div>
</div>

<script>
const dropdown = document.getElementById("dropdown");
const selected = dropdown.querySelector(".dropdown-selected");
const items = dropdown.querySelectorAll(".dropdown-item");
const hidden = document.getElementById("ddi");

selected.addEventListener("click", ()=>{
dropdown.classList.toggle("open");
});

items.forEach(item=>{
item.addEventListener("click", ()=>{
selected.innerText = item.innerText;
hidden.value = item.innerText;
dropdown.classList.remove("open");
});
});

document.addEventListener("click", (e)=>{
if(!dropdown.contains(e.target)){
dropdown.classList.remove("open");
}
});
</script>

</body>
</html>
