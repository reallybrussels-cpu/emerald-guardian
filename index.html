<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:system-ui;overflow:hidden;}
.section{position:absolute;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:1.2s ease;}
.section.active{opacity:1;pointer-events:auto;}
h1{font-size:56px;color:#d4af37;}
.input-group{width:280px;margin:15px 0;}
input{width:100%;padding:12px;background:#111;border:1px solid #333;color:#fff;}
.btn{padding:12px 30px;border:1px solid #d4af37;background:transparent;color:#d4af37;cursor:pointer;}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>

<div class="input-group">
<input id="email" placeholder="Email">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Senha">
</div>

<button class="btn" onclick="login()">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Access Granted</h2>
</div>

<script>

const supabase = window.supabase.createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

async function login(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert("Invalid login");
    return;
  }

  const { data } = await supabase
    .from("users_access")
    .select("status")
    .ilike("email", email)
    .limit(1);

  if(!data || data.length === 0){
    alert("User not found");
    return;
  }

  if(data[0].status !== "aprovado"){
    alert("Not approved");
    return;
  }

  next(2);
}

async function checkQR(){

  const token = new URLSearchParams(window.location.search).get("access");

  console.log("TOKEN:", token);

  if(!token) return;

  const { data, error } = await supabase
    .from("access_tokens")
    .select("*")
    .eq("token", token)
    .eq("status", "ativo");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if(data && data.length > 0){
    next(2);
  }
}

function next(n){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

window.onload = function(){
  checkQR();
};

</script>

</body>
</html>
