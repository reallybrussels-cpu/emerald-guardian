<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

html, body {
margin:0;
height:100%;
font-family:'Georgia', serif;
color:white;

background: linear-gradient(
to bottom,
#0b5d2a 0%,
#000000 50%,
#0b5d2a 100%
);
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

input, select {
padding:12px;
width:300px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

</style>
</head>

<body>

<div class="section active" id="s7">

<h2>Request Direct Access</h2>

<form action="https://formsubmit.co/really.brussels@gmail.com" method="POST" class="form-column">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="ddi" required>
<option value="">Select Country</option>
<option>Brazil (+55)</option>
<option>USA (+1)</option>
<option>UK (+44)</option>
</select>

<input type="text" name="phone" placeholder="Phone" required>

<!-- 🔥 ESSENCIAL -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<button type="submit">SEND</button>

</form>

</div>

</body>
</html>
