<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
height:100%;
font-family:'Inter',sans-serif;
color:white;
background: radial-gradient(circle at center,#0b5d2a 0%,#000 70%);
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transform:scale(1.05);
transition:1s;
}

.section.active{
opacity:1;
transform:scale(1);
}

h1,h2{
font-family:'Playfair Display',serif;
}

h1{
font-size:60px;
color:#e6c200;
text-shadow:0 0 15px gold;
}

.highlight{
color:#00ffa6;
text-shadow:0 0 10px #00ffa6;
}

button{
padding:14px 50px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
font-weight:bold;
}

input,select{
padding:12px;
width:260px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
margin:8px;
}

.success{
font-size:26px;
color:#00ffa6;
}
</style>
</head>

<body>

<!-- TELA 1 CORRIGIDA -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<h2>Request Direct Access</h2>

<form id="formEG">

<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Select Country</option>
<option>Afghanistan (+93)</option>
<option>Albania (+355)</option>
<option>Algeria (+213)</option>
<option>Andorra (+376)</option>
<option>Angola (+244)</option>
<option>Argentina (+54)</option>
<option>Australia (+61)</option>
<option>Austria (+43)</option>
<option>Belgium (+32)</option>
<option>Brazil (+55)</option>
<option>Canada (+1)</option>
<option>Chile (+56)</option>
<option>China (+86)</option>
<option>Colombia (+57)</option>
<option>Denmark (+45)</option>
<option>France (+33)</option>
<option>Germany (+49)</option>
<option>India (+91)</option>
<option>Indonesia (+62)</option>
<option>Italy (+39)</option>
<option>Japan (+81)</option>
<option>Mexico (+52)</option>
<option>Netherlands (+31)</option>
<option>Norway (+47)</option>
<option>Portugal (+351)</option>
<option>Russia (+7)</option>
<option>Saudi Arabia (+966)</option>
<option>South Africa (+27)</option>
<option>South Korea (+82)</option>
<option>Spain (+34)</option>
<option>Sweden (+46)</option>
<option>Switzerland (+41)</option>
<option>Turkey (+90)</option>
<option>United Arab Emirates (+971)</option>
<option>United Kingdom (+44)</option>
<option>United States (+1)</option>
<option>Uruguay (+598)</option>
<option>Venezuela (+58)</option>
</select>

<input name="phone" placeholder="Phone">

<button>SEND</button>

</form>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<p>We will contact you shortly</p>
<button onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form=document.getElementById("formEG");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
})
.then(()=>{
next(8);
form.reset();
});
});
</script>

</body>
</html>
