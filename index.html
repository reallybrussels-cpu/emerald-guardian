<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transform:scale(1.05);
filter:blur(10px);
transition:all 1s cubic-bezier(0.22,1,0.36,1);
}

.section.active{
opacity:1;
pointer-events:auto;
transform:scale(1);
filter:blur(0);
}

/* TITLES */
h1{
font-family:'Playfair Display',serif;
font-size:56px;
color:gold;
}
h2{
font-size:26px;
font-weight:300;
text-align:center;
}

/* IMAGES */
.shield{width:200px;margin-bottom:25px;}
.felino{width:340px;max-width:85%;margin-bottom:25px;}

/* INPUT PREMIUM */
.input-group{
position:relative;
width:280px;
margin:18px 0;
}

.input-group input,
.input-group select{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,255,136,0.3);
color:white;
padding:10px 0;
outline:none;
font-size:14px;
transition:0.3s;
}

.input-group label{
position:absolute;
top:10px;
left:0;
font-size:12px;
color:rgba(255,255,255,0.4);
transition:0.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group select:focus + label{
top:-8px;
font-size:10px;
color:#00ff88;
}

.input-group input:focus,
.input-group select:focus{
border-bottom:1px solid #00ff88;
box-shadow:0 6px 10px -6px #00ff88;
}

/* BUTTON */
.btn{
padding:14px 30px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
position:relative;
transition:0.3s;
}
.btn:hover{
background:gold;
color:black;
}

/* LOADING */
.btn.loading{
pointer-events:none;
opacity:0.7;
}
.btn.loading::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:18px;
height:18px;
margin:-9px 0 0 -9px;
border:2px solid gold;
border-top:2px solid transparent;
border-radius:50%;
animation:spin 0.8s linear infinite;
}
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* FORM */
.form-container{
width:320px;
padding:40px 30px;
border:1px solid rgba(0,255,136,0.1);
backdrop-filter:blur(6px);
}

/* SUCCESS */
.success{
color:#00ff88;
font-size:22px;
}

/* MOBILE */
@media(max-width:600px){
h1{font-size:36px;}
.form-container{width:85%;}
.felino{width:90%;}
}
</style>
</head>

<body>

<div class="section active" id="s1">
<img src="1977.png" class="shield">
<h1>Emerald Guardian</h1>
<div class="input-group">
<input placeholder=" " />
<label>ACCESS CODE</label>
</div>
<button class="btn" onclick="nextSafe(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button class="btn" onclick="nextSafe(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="nextSafe(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<img src="1979.png" class="felino">
<h2>A singular piece</h2>
<button class="btn" onclick="nextSafe(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="nextSafe(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="nextSafe(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<div class="form-container">
<h2>Request Access</h2>

<form id="formEG">

<div class="input-group">
<input name="name" placeholder=" " required>
<label>FULL NAME</label>
</div>

<div class="input-group">
<input name="email" placeholder=" " required>
<label>EMAIL ADDRESS</label>
</div>

<div class="input-group">
<select name="ddi">
<option value="">Select Country</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Germany (+49)</option>
<option>France (+33)</option>
</select>
<label>COUNTRY</label>
</div>

<div class="input-group">
<input name="phone" placeholder=" " required>
<label>PHONE NUMBER</label>
</div>

<button type="submit" class="btn">SUBMIT REQUEST</button>

</form>
</div>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<button class="btn" onclick="nextSafe(1)">RETURN</button>
</div>

<script>
function nextSafe(n){
let target=document.getElementById("s"+n);
if(!target)return;
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
setTimeout(()=>{target.classList.add("active");},60);
}

const form=document.getElementById("formEG");

form.addEventListener("submit", function(e){
e.preventDefault();

const btn = form.querySelector("button");
const originalText = btn.innerText;

btn.classList.add("loading");
btn.innerText = "ENVIANDO";

fetch("https://formsubmit.co/really.brussels@gmail.com", {
method: "POST",
body: new FormData(form)
})
.then(()=>{
nextSafe(8);
form.reset();
btn.classList.remove("loading");
btn.innerText = originalText;
})
.catch(()=>{
alert("Erro no envio");
btn.classList.remove("loading");
btn.innerText = originalText;
});
});
</script>

</body>
</html>
