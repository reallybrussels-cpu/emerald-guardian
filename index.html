<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emerald Guardian</title>
<style>
body{background:black;color:white;text-align:center;font-family:Arial}
input,select{display:block;margin:10px auto;padding:10px;width:260px}
button{padding:10px 30px;background:gold;border:none}
.success{color:#00ffa6}
</style>
</head>
<body>

<div id="formScreen">
<h2>Request Direct Access</h2>

<form id="formEG">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Select Country</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Germany (+49)</option>
<option>France (+33)</option>
<option>Italy (+39)</option>
<option>Spain (+34)</option>
<option>Portugal (+351)</option>
<option>Netherlands (+31)</option>
<option>Switzerland (+41)</option>
<option>Sweden (+46)</option>
<option>Norway (+47)</option>
<option>Denmark (+45)</option>
<option>Finland (+358)</option>
<option>Canada (+1)</option>
<option>Mexico (+52)</option>
<option>Argentina (+54)</option>
<option>Chile (+56)</option>
<option>Colombia (+57)</option>
<option>Peru (+51)</option>
<option>China (+86)</option>
<option>Japan (+81)</option>
<option>South Korea (+82)</option>
<option>India (+91)</option>
<option>Indonesia (+62)</option>
<option>Thailand (+66)</option>
<option>United Arab Emirates (+971)</option>
<option>Saudi Arabia (+966)</option>

</select>

<input name="phone" placeholder="Phone">
<button id="btn">SEND</button>
</form>
</div>

<div id="successScreen" style="display:none">
<h2 class="success">Request received successfully</h2>
<p>We will contact you shortly.</p>
</div>

<script>
const form=document.getElementById("formEG");
form.addEventListener("submit",function(e){
e.preventDefault();
fetch("https://formsubmit.co/really.brussels@gmail.com",{method:"POST",body:new FormData(form)})
.then(()=>{
document.getElementById("formScreen").style.display="none";
document.getElementById("successScreen").style.display="block";
});
});
</script>

</body>
</html>
