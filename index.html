html, body {

height:100%;
font-family:'Inter', sans-serif;
color:white;
background: radial-gradient(circle at center, #0b5d2a 0%, #000000 70%);
overflow:hidden;
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transform: scale(1.05);
transition: opacity 1s ease, transform 1s ease;
pointer-events:none;
}

.section.active {
opacity:1;
transform: scale(1);
pointer-events:auto;
}

h1, h2 {
font-family: 'Playfair Display', serif;
letter-spacing: 1px;
}

h1 {
font-size:60px;
color:#e6c200;
text-shadow: 0 0 15px gold;
}

.highlight {
color:#00ffa6;
text-shadow: 0 0 10px #00ffa6;
}

button {
padding:14px 50px;
background: linear-gradient(45deg, gold, #e6c200);
border:none;
cursor:pointer;
margin-top:25px;
font-weight:600;
letter-spacing:1px;
transition:0.3s;
}

button:hover {
transform: scale(1.05);
box-shadow: 0 0 20px gold;
}

.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

input, select {
padding:14px;
width:300px;
background: rgba(0,0,0,0.7);
border:1px solid #00ffa6;
color:white;
text-align:center;
transition:0.3s;
}

input:focus, select:focus {
outline:none;
border-color:gold;
box-shadow: 0 0 10px gold;
}

.success {
font-size:28px;
color:#00ffa6;
text-shadow: 0 0 15px #00ffa6;
animation: fadeIn 2s ease;
}

.subtext {
margin-top:15px;
opacity:0.7;
font-size:14px;
animation: fadeIn 3s ease;
}

@keyframes fadeIn {
from {opacity:0; transform: translateY(20px);}
to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form = document.getElementById("formEG");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", function(e){
e.preventDefault();

btn.innerText = "SENDING...";
btn.disabled = true;

const data = new FormData(form);

fetch("https://formsubmit.co/really.brussels@gmail.com", {
method: "POST",
body: data
})
.then(response => {
if(response.ok){
setTimeout(() => {
next(8);
form.reset();
}, 1000);
} else {
btn.innerText = "ERROR";
}
})
.catch(() => {
btn.innerText = "FAILED";
});
});
