<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1.2s ease;
}

.section.active{
opacity:1;
pointer-events:auto;
}

h1{font-size:56px;color:#d4af37;letter-spacing:2px;}
h2{font-size:20px;font-weight:300;text-align:center;max-width:420px;color:#aaa;line-height:1.6;}

.sub{font-size:12px;letter-spacing:3px;color:#666;margin-bottom:10px;}

.shield{width:140px;margin-bottom:30px;}
.felino{width:340px;max-width:85%;margin-bottom:25px;}

.input-group{position:relative;width:280px;margin:20px 0;}

.input-group input{
width:100%;
background:rgba(0,255,136,0.03);
border:1px solid rgba(0,255,136,0.25);
color:white;
padding:12px 14px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border:1px solid #00ff88;
box-shadow:0 0 10px rgba(0,255,136,0.25);
}

.input-group label{
position:absolute;
top:-10px;
left:0;
font-size:10px;
color:#00ff88;
}

.btn{
padding:14px 40px;
margin-top:25px;
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
cursor:pointer;
transition:0.4s;
letter-spacing:2px;
}

.btn:hover{
background:#d4af37;
color:#000;
box-shadow:0 0 25px rgba(212,175,55,0.4);
}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>

<div class="input-group">
<input id="email" placeholder=" ">
<label>EMAIL</label>
</div>

<div class="input-group">
<input id="password" type="password" placeholder=" ">
<label>PASSWORD</label>
</div>

<button class="btn" onclick="login()">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Access Granted</h2>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
"https://mihrsfotrbigixqkpwhu.supabase.co",
"sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* QR + LOG + CONTADOR */
async function checkQRAccess(){

const token = new URLSearchParams(window.location.search).get("access");
if(!token) return;

const { data } = await supabase
.from("access_tokens")
.select("*")
.eq("token", token)
.eq("status", "ativo")
.single();

if(!data) return;

/* LOG */
try{
let geo = {};
try{
const res = await fetch("https://ipapi.co/json/");
geo = await res.json();
}catch(e){}

await supabase.from("access_logs").insert({
token: data.token,
nome: data.nome,
tipo: data.tipo,
ip: geo.ip || "unknown",
cidade: geo.city || "unknown",
pais: geo.country_name || "unknown",
user_agent: navigator.userAgent
});
}catch(e){}

/* CONTADOR */
await supabase
.from("access_tokens")
.update({ uses: (data.uses || 0) + 1 })
.eq("id", data.id);

nextSafe(2);
}

/* LOGIN */
window.login = async function(){

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signInWithPassword({ email, password });

if(error){
alert("Invalid login credentials");
return;
}

const { data } = await supabase
.from("users_access")
.select("status")
.ilike("email", email)
.limit(1);

if(!data || data.length === 0){
alert("User not found in access list");
return;
}

if(data[0].status !== "aprovado"){
alert("Access not approved");
return;
}

nextSafe(2);
}

/* NAV */
window.nextSafe = function(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
checkQRAccess();
});

</script>

</body>
</html>
