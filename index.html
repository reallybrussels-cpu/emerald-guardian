<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
background:#000;
color:white;
overflow:hidden;
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

input, select {
padding:10px;
margin:5px;
width:260px;
background:black;
border:1px solid #00ffa6;
color:white;
}

button {
padding:10px 30px;
background:gold;
border:none;
cursor:pointer;
}

.guardian {
width:400px;
}

.puma-img {
width:100%;
opacity:0;
transform:translateY(40px);
filter:brightness(0) invert(1) drop-shadow(0 0 6px #00ffa6);
}

.puma-active {
animation:fade 2s forwards, float 6s infinite 2s;
}

@keyframes fade {
to {opacity:1;transform:translateY(0);}
}

@keyframes float {
50% {transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="login()">ENTER</button>
<p id="erro"></p>
</div>

<!-- PUMA -->
<div class="section" id="s2">
<div class="guardian">
<img src="puma.png" class="puma-img">
</div>
<button onclick="next(3)">CONTINUE</button>
</div>

<!-- FORM FINAL -->
<div class="section" id="s3">
<h2>Request Access</h2>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">

<select id="ddi">
<option value="">DDI</option>
<option value="55">Brazil +55</option>
<option value="1">USA +1</option>
<option value="44">UK +44</option>
</select>

<input id="telefone" placeholder="Telefone">

<button onclick="enviar()">ENVIAR</button>

<p id="msg"></p>
</div>

<script>

function login(){
let code=document.getElementById("code").value;
if(code==="123A"){
next(2);
}else{
document.getElementById("erro").innerText="Invalid code";
}
}

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===2){
setTimeout(()=>{
document.querySelector(".puma-img").classList.add("puma-active");
},800);
}
}

function enviar(){

let nome=document.getElementById("nome").value;
let email=document.getElementById("email").value;
let ddi=document.getElementById("ddi").value;
let telefone=document.getElementById("telefone").value;

// DATA AUTOMATICA
let data = new Date().toLocaleString();

if(!nome || !email || !ddi || !telefone){
document.getElementById("msg").innerText="Preencha todos os campos";
return;
}

// AQUI VOCÊ PODE INTEGRAR COM GOOGLE SHEETS OU SUPABASE
console.log({
nome,
email,
ddi,
telefone,
data
});

// LIMPAR CAMPOS
document.getElementById("nome").value="";
document.getElementById("email").value="";
document.getElementById("ddi").value="";
document.getElementById("telefone").value="";

// MENSAGEM BONITA
document.getElementById("msg").innerHTML =
"✔ Solicitação enviada com sucesso<br><br>Em breve entraremos em contato.";

}

</script>

</body>
</html>
