<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

html, body {
margin:0;
height:100%;
font-family:'Georgia', serif;
color:white;

background: linear-gradient(
to bottom,
#0b5d2a 0%,
#000000 50%,
#0b5d2a 100%
);
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

h1 { font-size:60px; color:#e6c200; }
.highlight { color:#00ffa6; }

button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

input, select {
padding:12px;
width:300px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<!-- TELAS -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>
