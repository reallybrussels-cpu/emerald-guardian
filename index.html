<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
height:100%;
font-family:'Inter',sans-serif;
color:white;
background: radial-gradient(circle at center,#0b5d2a 0%,#000 70%);
overflow:hidden;
}

.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
pointer-events:none;
transition:1s;
}

.section.active{
opacity:1;
pointer-events:auto;
}

h1{
font-size:60px;
color:#e6c200;
text-shadow:0 0 15px gold;
font-family:'Playfair Display',serif;
}

button{
padding:14px 50px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

input,select{
padding:12px;
width:260px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
margin:8px;
}

.success{
color:#00ffa6;
font-size:24px;
}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Rare Asset</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>Singular Piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute Rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private Access</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<h2>Request Access</h2>

<form id="formEG">
<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi">
<option>Brazil (+55)</option>
<option>United States (+1)</option>
</select>

<input name="phone" placeholder="Phone">
<button>SEND</button>
</form>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<button onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}
</script>

</body>
</html>
