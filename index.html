<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

html, body {
margin:0;
height:100%;
font-family:'Georgia', serif;
color:white;

background: linear-gradient(
to bottom,
#0b5d2a 0%,
#000000 50%,
#0b5d2a 100%
);
}

/* TELAS */
.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

/* TEXTO */
h1 { font-size:60px; color:#e6c200; }
.highlight { color:#00ffa6; }

/* BOTÃO */
button {
padding:12px 40px;
background:gold;
border:none;
cursor:pointer;
margin-top:20px;
}

/* FORM HORIZONTAL FORÇADO */
.form-row {
display:flex;
gap:15px;
justify-content:center;
align-items:center;
flex-wrap:nowrap; /* 👈 NÃO QUEBRA LINHA */
}

/* INPUTS */
input, select {
padding:12px;
width:200px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

/* RESPONSIVO (evita quebrar feio) */
@media(max-width:900px){
.form-row{
flex-wrap:wrap;
}
}

</style>
</head>

<body>

<!-- TELA 1 -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="next(2)">ENTER</button>
</div>

<!-- TELA 2 -->
<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<!-- TELA 3 -->
<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<!-- TELA 4 -->
<div class="section" id="s4">
<h2>A singular piece</h2>
<button onclick="next(5)">CONTINUE</button>
</div>

<!-- TELA 5 -->
<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<!-- TELA 6 -->
<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- TELA 7 -->
<div class="section" id="s7">

<h2>Request Direct Access</h2>

<div class="form-row">

<input id="nome" placeholder="Full Name">
<input id="email" placeholder="Email">
<select id="ddi">
<option>DDI</option>
<option>+55</option>
<option>+1</option>
<option>+44</option>
</select>
<input id="telefone" placeholder="Phone">

</div>

<button onclick="enviar()">SEND</button>

<p id="msg"></p>

</div>

<script>

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

/* ENVIO SIMPLES (SEM BLOQUEIO) */
function enviar(){

let nome = document.getElementById("nome").value;
let email = document.getElementById("email").value;
let ddi = document.getElementById("ddi").value;
let telefone = document.getElementById("telefone").value;

if(!nome || !email || !telefone){
document.getElementById("msg").innerText="Please fill all fields";
return;
}

/* SIMULA ENVIO (SEM ERRO DE SEGURANÇA) */
document.getElementById("msg").innerHTML =
"✔ Request sent successfully<br><br>We will contact you shortly.";

document.getElementById("nome").value="";
document.getElementById("email").value="";
document.getElementById("telefone").value="";
}

</script>

</body>
</html>
