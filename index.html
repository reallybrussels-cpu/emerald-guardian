<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:system-ui;overflow:hidden;}
.section{position:absolute;width:100%;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:1.2s ease;}
.section.active{opacity:1;pointer-events:auto;}
h1{font-size:56px;color:#d4af37;}
h2{font-size:20px;text-align:center;color:#aaa;}
.input-group{width:280px;margin:15px 0;}
input{width:100%;padding:12px;background:#111;border:1px solid #333;color:#fff;}
.btn{padding:12px 30px;border:1px solid #d4af37;background:transparent;color:#d4af37;cursor:pointer;}
.btn:hover{background:#d4af37;color:#000;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>

<div class="input-group">
<input id="email" placeholder="Email">
</div>

<div class="input-group">
<input id="password" type="password" placeholder="Senha">
</div>

<button class="btn" onclick="login()">ENTER</button>
</div>

<!-- CONTEÚDO -->
<div class="section" id="s2">
<h2>Access Granted</h2>
<button class="btn" onclick="nextSafe(1)">Voltar</button>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://mihrsfotrbigixqkpwhu.supabase.co",
  "sb_publishable_eyG-SUt4b3_dV37u_QzdIQ_78X8r1rL"
);

/* =========================
   🔐 LOGIN NORMAL
========================= */
window.login = async function(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert("Invalid login credentials");
    return;
  }

  const { data } = await supabase
    .from("users_access")
    .select("status")
    .ilike("email", email)
    .limit(1);

  if(!data || data.length === 0){
    alert("User not found in access list");
    return;
  }

  if(data[0].status !== "aprovado"){
    alert("Access not approved");
    return;
  }

  nextSafe(2);
}

/* =========================
   🚀 QR + RASTREAMENTO
========================= */
async function checkQRAccess(){

  const params = new URLSearchParams(window.location.search);
  const token = params.get("access");

  if(!token) return;

  const { data } = await supabase
    .from("access_tokens")
    .select("*")
    .eq("token", token)
    .eq("status", "ativo")
    .limit(1);

  if(data && data.length > 0){

    let geo = {};
    try{
      const res = await fetch("https://ipapi.co/json/");
      geo = await res.json();
    }catch(e){}

    await supabase.from("access_logs").insert({
      token: token,
      ip: geo.ip || "unknown",
      user_agent: navigator.userAgent,
      country: geo.country_name || "unknown",
      city: geo.city || "unknown"
    });

    nextSafe(2);
  }
}

/* =========================
   NAVEGAÇÃO
========================= */
window.nextSafe = function(n){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* INIT */
checkQRAccess();

</script>

</body>
</html>
