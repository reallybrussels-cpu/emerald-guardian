<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:1s;
}

.section.active{
opacity:1;
pointer-events:auto;
}

/* TITLE */
h1{
font-family:'Playfair Display',serif;
font-size:60px;
color:gold;
text-shadow:0 0 20px gold;
}

/* SUBTLE GREEN LINE */
.line{
width:400px;
height:3px;
background:linear-gradient(90deg, transparent, #00ff88, transparent);
margin:20px 0;
box-shadow:0 0 15px #00ff88;
}

/* BUTTON */
.btn{
width:300px;
padding:14px;
margin-top:20px;
background:transparent;
border:1px solid gold;
color:gold;
cursor:pointer;
letter-spacing:2px;
transition:0.4s;
}

.btn:hover{
background:gold;
color:black;
box-shadow:0 0 15px gold;
}

/* FORM - ALWAYS VERTICAL */
form{
display:flex;
flex-direction:column;
align-items:center;
}

/* INPUT */
input, select{
width:300px;
padding:14px;
margin:8px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
box-sizing:border-box;
transition:0.3s;
}

/* HOVER EFFECT PREMIUM */
input:hover, select:hover,
input:focus, select:focus{
border:1px solid #00ff88;
box-shadow:0 0 12px #00ff88;
outline:none;
}

/* SUCCESS */
.success{
color:#00ffa6;
font-size:24px;
text-shadow:0 0 10px #00ffa6;
}
</style>
</head>

<body>

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<div class="line"></div>
<input placeholder="ACCESS CODE">
<button class="btn" onclick="next(2)">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button class="btn" onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<h2>A singular piece</h2>
<button class="btn" onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="next(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<h2>Request Access</h2>
<div class="line"></div>

<form id="formEG">

<input name="name" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>

<select name="ddi" required>
<option>Select Country</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
<option>United Kingdom (+44)</option>
<option>Germany (+49)</option>
<option>France (+33)</option>
<option>Italy (+39)</option>
<option>Spain (+34)</option>
<option>Portugal (+351)</option>
<option>Netherlands (+31)</option>
<option>Switzerland (+41)</option>
<option>Sweden (+46)</option>
<option>Norway (+47)</option>
<option>Denmark (+45)</option>
<option>Finland (+358)</option>
<option>Canada (+1)</option>
<option>Mexico (+52)</option>
<option>Argentina (+54)</option>
<option>Chile (+56)</option>
<option>Colombia (+57)</option>
<option>Peru (+51)</option>
<option>China (+86)</option>
<option>Japan (+81)</option>
<option>South Korea (+82)</option>
<option>India (+91)</option>
<option>Indonesia (+62)</option>
<option>Thailand (+66)</option>
<option>United Arab Emirates (+971)</option>
<option>Saudi Arabia (+966)</option>
</select>

<input name="phone" placeholder="Phone" required>

<button class="btn" type="submit">SEND</button>

</form>
</div>

<div class="section" id="s8">
<h2 class="success">Request received successfully</h2>
<p>We will contact you shortly</p>
<button class="btn" onclick="next(1)">RETURN</button>
</div>

<script>
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

const form=document.getElementById("formEG");

form.addEventListener("submit",function(e){
e.preventDefault();

fetch("https://formsubmit.co/really.brussels@gmail.com",{
method:"POST",
body:new FormData(form)
})
.then(()=>{
next(8);
form.reset();
});
});
</script>

</body>
</html>
