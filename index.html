<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
background:#000;
color:white;
overflow:hidden;
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
pointer-events:none;
}

.section.active {
opacity:1;
pointer-events:auto;
}

input, select {
padding:12px;
margin:10px;
width:260px;
background:black;
border:1px solid #00ffa6;
color:white;
text-align:center;
}

button {
padding:12px 35px;
background:linear-gradient(90deg,#e6c200,#b89600);
border:none;
cursor:pointer;
}

/* PUMA */
.guardian {
width:420px;
}

.puma-img {
width:100%;
opacity:0;
transform:translateY(40px);
filter:brightness(0) invert(1) drop-shadow(0 0 6px #00ffa6);
}

.puma-active {
animation:fade 2s forwards, float 6s infinite 2s;
}

@keyframes fade {
to {opacity:1;transform:translateY(0);}
}

@keyframes float {
50% {transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<p>Restricted Access</p>

<input id="code" placeholder="ACCESS CODE">
<button onclick="check()">ENTER</button>
<p id="erro"></p>
</div>

<!-- PUMA -->
<div class="section" id="s2">
<div class="guardian">
<img src="puma.png" class="puma-img">
</div>

<button onclick="next(3)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s3">

<h2>Request Direct Access</h2>

<input id="nome" placeholder="Nome" required>
<input id="email" placeholder="Email" required>

<select id="ddi" required>
<option value="">DDI</option>
<option>+55 Brasil</option>
<option>+1 USA</option>
<option>+44 UK</option>
<option>+351 Portugal</option>
<option>+971 UAE</option>
<option>+86 China</option>
</select>

<input id="telefone" placeholder="Telefone" required>

<button onclick="enviar()">SUBMIT</button>

<p id="msg"></p>

</div>

<script>

/* LOGIN */
function check(){
let code = document.getElementById("code").value;

if(code === "123A"){
next(2);
}else{
document.getElementById("erro").innerText="Invalid code";
}
}

/* NAV */
function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n===2){
setTimeout(()=>{
document.querySelector(".puma-img").classList.add("puma-active");
},800);
}
}

/* VALIDAÇÃO */
function validarEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

/* ENVIO */
function enviar(){

let nome = document.getElementById("nome").value.trim();
let email = document.getElementById("email").value.trim();
let ddi = document.getElementById("ddi").value;
let telefone = document.getElementById("telefone").value.trim();

if(!nome || !email || !ddi || !telefone){
document.getElementById("msg").innerText="Preencha todos os campos";
return;
}

if(!validarEmail(email)){
document.getElementById("msg").innerText="Email inválido";
return;
}

/* proteção simples */
nome = nome.replace(/<[^>]*>?/gm, '');
email = email.replace(/<[^>]*>?/gm, '');
telefone = telefone.replace(/<[^>]*>?/gm, '');

fetch("https://script.google.com/macros/s/AKfycbyUPhY7Gc2XN1WBQB5KZa8IoexJijO-vf5mQjzIw6pkBW3Uyk8i6fnfZaRvMxzbG2Pm/exec", {
method:"POST",
body:JSON.stringify({
nome: nome,
email: email,
telefone: ddi + " " + telefone
})
})
.then(res=>res.json())
.then(()=>{
document.getElementById("msg").innerText="Request sent successfully";
})
.catch(()=>{
document.getElementById("msg").innerText="Error sending request";
});

}

</script>

</body>
</html>
