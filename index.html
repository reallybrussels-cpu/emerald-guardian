<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

/* SECTIONS */
.section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.5s ease;
}

.section.active{
opacity:1;
pointer-events:auto;
}

/* TEXT */
h1{font-size:56px;color:#d4af37;letter-spacing:1px;}
h2{font-size:24px;font-weight:300;text-align:center;max-width:400px;}

/* IMAGES */
.shield{width:180px;margin-bottom:20px;}
.felino{width:320px;max-width:85%;margin-bottom:20px;}

/* INPUT */
.input-group{
position:relative;
width:280px;
margin:15px 0;
}

.input-group input{
width:100%;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,255,136,0.25);
color:white;
padding:10px 0;
outline:none;
}

.input-group label{
position:absolute;
top:10px;
left:0;
font-size:12px;
color:#666;
transition:0.25s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:10px;
color:#00ff88;
}

/* DROPDOWN PREMIUM */
.dropdown{
width:280px;
margin:15px 0;
position:relative;
cursor:pointer;
}

.dropdown-selected{
border-bottom:1px solid rgba(0,255,136,0.25);
padding:10px 0;
}

.dropdown-list{
position:absolute;
top:100%;
left:0;
width:100%;
background:#000;
border:1px solid rgba(0,255,136,0.3);
max-height:0;
overflow:hidden;
transition:0.3s ease;
}

.dropdown.open .dropdown-list{
max-height:200px;
}

.dropdown-item{
padding:12px;
transition:0.2s;
}

.dropdown-item:hover{
background:#001a10;
}

/* BUTTON */
.btn{
padding:14px 30px;
margin-top:20px;
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#d4af37;
color:#000;
}

/* FORM */
.form-container{
width:320px;
padding:30px;
border:1px solid rgba(0,255,136,0.08);
}

.success{color:#00ff88;}
</style>
</head>

<body>

<div class="section active" id="s1">
<img src="1977.png" class="shield">
<h1>Emerald Guardian</h1>

<div class="input-group">
<input id="code" placeholder=" ">
<label>ACCESS CODE</label>
</div>

<button class="btn" onclick="enterSite()">ENTER</button>
</div>

<div class="section" id="s2">
<h2>Exclusive Access</h2>
<button class="btn" onclick="nextSafe(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button class="btn" onclick="nextSafe(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<img src="1979.png" class="felino">
<h2>A singular piece</h2>
<button class="btn" onclick="nextSafe(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button class="btn" onclick="nextSafe(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button class="btn" onclick="nextSafe(7)">CONTINUE</button>
</div>

<div class="section" id="s7">
<div class="form-container">

<h2>Request Access</h2>

<form id="formEG">

<div class="input-group">
<input name="name" placeholder=" " required>
<label>FULL NAME</label>
</div>

<div class="input-group">
<input name="email" placeholder=" " required>
<label>EMAIL</label>
</div>

<div class="dropdown" id="dropdown">
<div class="dropdown-selected">Select Country</div>
<div class="dropdown-list">
<div class="dropdown-item">Brazil (+55)</div>
<div class="dropdown-item">USA (+1)</div>
<div class="dropdown-item">UK (+44)</div>
</div>
</div>

<input type="hidden" name="ddi" id="ddi">

<div class="input-group">
<input name="phone" placeholder=" " required>
<label>PHONE</label>
</div>

<button class="btn">SUBMIT</button>

</form>

</div>
</div>

<div class="section" id="s8">
<h2 class="success">Request sent successfully</h2>
<button class="btn" onclick="nextSafe(1)">RETURN</button>
</div>

<script>

/* ENTER */
function enterSite(){
const code=document.getElementById("code").value.trim();
if(!code){alert("Enter access code");return;}
nextSafe(2);
}

/* NAV */
function nextSafe(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

/* DROPDOWN */
const dropdown=document.getElementById("dropdown");
const selected=dropdown.querySelector(".dropdown-selected");
const items=dropdown.querySelectorAll(".dropdown-item");
const hidden=document.getElementById("ddi");

selected.onclick=()=>dropdown.classList.toggle("open");

items.forEach(item=>{
item.onclick=()=>{
selected.innerText=item.innerText;
hidden.value=item.innerText;
dropdown.classList.remove("open");
};
});

document.addEventListener("click",(e)=>{
if(!dropdown.contains(e.target)){
dropdown.classList.remove("open");
}
});

/* FORM */
document.getElementById("formEG").addEventListener("submit", async function(e){
  e.preventDefault();

  const form = e.target;

  const data = {
    username: form.email.value,
    password: form.phone.value
  };

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.success){
      localStorage.setItem('token', result.token);
      nextSafe(8);
    } else {
      alert('Acesso negado');
    }

  } catch (error) {
    console.error(error);
    alert('Erro ao conectar com o servidor');
  }
});

</script>

</body>
</html>
