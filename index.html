<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<style>

body {
margin:0;
font-family:'Georgia', serif;
color:white;
overflow:hidden;
background:
radial-gradient(circle at 30% 20%, rgba(0,255,150,0.15), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(0,255,150,0.08), transparent 40%),
#000;
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
opacity:0;
filter:blur(10px);
transition: all 1s ease;
pointer-events:none;
}

.section.active {
opacity:1;
filter:blur(0);
pointer-events:auto;
}

h1 { font-size:60px; color:#e6c200; }
.highlight { color:#00ffa6; }

input, select {
padding:12px;
width:260px;
margin:10px;
background:transparent;
border:1px solid rgba(0,255,150,0.4);
color:white;
text-align:center;
}

button {
padding:12px 35px;
background:linear-gradient(90deg,#e6c200,#b89600);
border:none;
cursor:pointer;
}

.guardian { width:420px; }

.puma-img {
width:100%;
filter: brightness(0) invert(1) drop-shadow(0 0 20px #00ffa6);
}

</style>
</head>

<body>

<!-- TELAS (mantidas iguais) -->

<div class="section active" id="s1">
<h1>Emerald Guardian</h1>
<input id="code" placeholder="ACCESS CODE">
<button onclick="check()">ENTER</button>
</div>

<div class="section" id="s2">
<h2>There is a difference between something valuable...</h2>
<h2 class="highlight">and something truly unique.</h2>
<button onclick="next(3)">CONTINUE</button>
</div>

<div class="section" id="s3">
<h2>Formed over millions of years</h2>
<button onclick="next(4)">CONTINUE</button>
</div>

<div class="section" id="s4">
<div class="guardian">
<img src="puma.png" class="puma-img">
</div>
<button onclick="next(5)">CONTINUE</button>
</div>

<div class="section" id="s5">
<h2>Absolute rarity</h2>
<button onclick="next(6)">CONTINUE</button>
</div>

<div class="section" id="s6">
<h2>Private and selective</h2>
<button onclick="next(7)">CONTINUE</button>
</div>

<!-- FORM -->
<div class="section" id="s7">

<h2>Request Direct Access</h2>

<form target="hiddenFrame"
action="https://script.google.com/macros/s/AKfycbwNOUYeGghkyaRiv6uh1klmxNjzk5egcdU-GqA8xnkuJ1q0NzyCu24Hq-iO3YaNCCWq/exec"
method="POST">

<input name="nome" placeholder="Full Name" required>
<input name="email" placeholder="Email" required>
<input name="ddi" placeholder="DDI" required>
<input name="telefone" placeholder="Phone Number" required>

<button type="submit">SUBMIT</button>

</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<p id="msg"></p>

</div>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<p id="msg"></p>

</div>

<script>

function check(){
if(document.getElementById("code").value==="123A") next(2);
}

function next(n){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

/* SUCESSO SEM CORS */
document.getElementById("form").addEventListener("submit", function(){

document.getElementById("msg").innerHTML =
"✔ Request successfully sent<br><br>Our team will contact you shortly.";

});

</script>

</body>
</html>
