<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Guardian</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
html, body {
margin:0;
height:100%;
font-family:'Inter', sans-serif;
color:white;
background: radial-gradient(circle at center, #0b5d2a 0%, #000000 70%);
overflow:hidden;
}

.section {
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transform: scale(1.05);
transition: opacity 1s ease, transform 1s ease;
pointer-events:none;
}

.section.active {
opacity:1;
transform: scale(1);
pointer-events:auto;
}

h1, h2 {
font-family: 'Playfair Display', serif;
letter-spacing: 1px;
}

h1 {
font-size:60px;
color:#e6c200;
text-shadow: 0 0 15px gold;
}

button {
padding:14px 50px;
background: linear-gradient(45deg, gold, #e6c200);
border:none;
cursor:pointer;
margin-top:25px;
}

.form-column {
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.form-column input,
.form-column select {
padding:14px;
width:280px;
background: rgba(0,0,0,0.7);
border:1px solid #00ffa6;
color:white;
text-align:center;
}

.success {
font-size:28px;
color:#00ffa6;
}

</style>
</head>

<body>

<div class="section active" id="s7">
<h2>Request Direct Access</h2>

<form id="formEG" class="form-column">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<select name="ddi" required>
<option value="">Country</option>
<option>Brazil (+55)</option>
<option>United States (+1)</option>
</select>

<input type="text" name="phone" placeholder="Phone" required>

<button type="submit" id="submitBtn">SEND</button>

</form>
</div>

</body>
</html>
